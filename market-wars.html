// ── APP ROOT ──
function App() {
  const [screen,  setScreen]  = useState("lobby");
  const [session, setSession] = useState(null);
  const [players, setPlayers] = useState([]);
  const [result,  setResult]  = useState(null);
  const [wsReady, setWsReady] = useState(!ONLINE_MODE);
  const [wsError, setWsError] = useState(null);
  const clientRef = useRef(null);
  const playerIdRef = useRef(null);
  const pendingJoinRef = useRef(null); // เก็บ JOIN params สำหรับ auto-rejoin
  const screenRef = useRef("lobby");   // track screen in WS closure (state is stale)
  const handleGameEnd = useCallback((r) => { setResult(r); setScreen("result"); }, []);

  // init WS client ครั้งเดียว
  useEffect(() => {
    const client = new MWClient((msg) => {
      if (msg.type === "CONNECTED") {
        setWsReady(true); setWsError(null);
        // auto-rejoin if we lost connection mid-join and server restarted
        if (pendingJoinRef.current) {
          const r = pendingJoinRef.current;
          client.join(r.nick, r.code, r.mode, r.endMode, r.target, r.duration);
        }
      }
      if (msg.type === "OFFLINE") { setWsReady(false); setWsError("ไม่สามารถเชื่อมต่อ server ได้ — เล่น offline แทน"); }
      if (msg.type === "DISCONNECTED") {
        setWsReady(false);
        // if server drops while we're in lobby-join or waiting room, the room is gone
        if (screenRef.current === "joining" || screenRef.current === "waiting") {
          pendingJoinRef.current = null;
          screenRef.current = "lobby";
          setScreen("lobby");
          setSession(null);
          setPlayers([]);
          setWsError("การเชื่อมต่อขาด — ห้องหลุดแล้ว กรุณาเข้าร่วมใหม่");
        } else {
          setWsError("หลุดการเชื่อมต่อ กำลัง reconnect...");
        }
      }

      if (msg.type === "JOINED") {
        pendingJoinRef.current = null; // server confirmed — no longer need auto-rejoin
        playerIdRef.current = msg.playerId;
        setSession(s => ({...s, playerId:msg.playerId, isHost:msg.isHost,
          mode:msg.mode, endMode:msg.endMode, target:msg.target, duration:msg.duration}));
        setPlayers(msg.players.map(p=>({...p,isMe:p.id===msg.playerId})));
        screenRef.current = "waiting";
        setScreen("waiting");
      }
if (msg.type === "PLAYER_JOINED") {
  setPlayers(p => {
    const exists = p.find(x => x.id===msg.playerId);
    if (exists) return p;
    return [...p, {id:msg.playerId, nick:msg.nick, ready:false, isMe:false}];
  });
}
if (msg.type === "PLAYERS_UPDATE") {
  setPlayers(prev => {
    const localBots = prev.filter(p => p.isBot);
    const serverPlayers = msg.players.map(p => ({...p, isMe: p.id === playerIdRef.current}));
    return [...serverPlayers, ...localBots];
  });
}
      if (msg.type === "GAME_START") {
        setScreen("game");
      }
      if (msg.type === "GAME_OVER") {
        setResult({...msg, fromServer:true});
        setScreen("result");
      }
    });
    clientRef.current = client;
    client.connect();
    return () => client.disconnect();
  }, []);

const handleLobbyStart = (s) => {
  if (ONLINE_MODE && clientRef.current?.ok) {
    setSession(s);
    pendingJoinRef.current = s; // store for auto-rejoin if connection drops before JOINED
    clientRef.current.join(s.nick, s.code, s.mode, s.endMode, s.target, s.duration);
    screenRef.current = "joining";
    setScreen("joining"); // wait for server JOINED confirmation before entering room
  } else {
    // offline: initialize players with the host so WaitingRoom works
    setSession(s);
    setPlayers([{id:"me-offline", nick:s.nick, name:s.nick, ready:true, isMe:true}]);
    screenRef.current = "waiting";
    setScreen("waiting");
  }
};

  if (screen==="lobby") return (
    <>
      {ONLINE_MODE && (
        <div style={{
          position:"fixed",top:0,left:0,right:0,zIndex:9999,
          padding:"6px 16px",textAlign:"center",fontSize:10,
          background: wsReady?"#4ade8020":"#f8717120",
          color: wsReady?"#4ade80":"#f87171",
          borderBottom: `1px solid ${wsReady?"#4ade8030":"#f8717130"}`,
          fontFamily:"'IBM Plex Mono',monospace",
        }}>
          {wsReady ? "🟢 เชื่อมต่อ Server แล้ว — Online Multiplayer พร้อม" : (wsError||"⏳ กำลังเชื่อมต่อ Server...")}
        </div>
      )}
      <Lobby onStart={handleLobbyStart} wsReady={wsReady||!ONLINE_MODE}/>
    </>
  );
  if (screen==="joining") return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0f172a",color:"#94a3b8",fontFamily:"'IBM Plex Mono',monospace",gap:0}}>
      <div style={{fontSize:40,marginBottom:18,display:"inline-block",animation:"spin 1.1s linear infinite"}}>⚙️</div>
      <div style={{fontSize:17,fontWeight:700,color:"#e2e8f0",marginBottom:8}}>กำลังเข้าร่วมห้อง...</div>
      <div style={{fontSize:12,opacity:0.55,marginBottom:32}}>รอการยืนยันจาก Server</div>
      <button onClick={()=>{ pendingJoinRef.current=null; screenRef.current="lobby"; setScreen("lobby"); setSession(null); }}
        style={{padding:"8px 28px",background:"#1e293b",border:"1px solid #334155",borderRadius:8,color:"#94a3b8",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
        ยกเลิก
      </button>
    </div>
  );
  if (screen==="waiting") return (
<WaitingRoom session={session} client={clientRef.current} players={players} setPlayers={setPlayers} onGo={(ps, forceOffline)=>{ setPlayers(ps); if(forceOffline) setSession(s=>({...s,_offline:true})); screenRef.current="game"; setScreen("game"); }}/>
  );
  if (screen==="game") return (
    <GameScreen session={session} initPlayers={players} client={session?._offline ? null : clientRef.current} onEnd={handleGameEnd}/>
  );
  if (screen==="result") return (
  <ResultScreen result={result} session={session} onRestart={()=>{ setResult(null); setSession(null); setPlayers([]); setScreen("lobby"); }}/>
);
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

@keyframes tab-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes card-deal { from { opacity:0; transform:translateY(-12px) rotateY(-30deg) scale(0.85); } to { opacity:1; transform:translateY(0) rotateY(0) scale(1); } }
@keyframes mine-shake { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-6px)} 30%{transform:translateX(6px)} 45%{transform:translateX(-5px)} 60%{transform:translateX(5px)} 75%{transform:translateX(-3px)} 90%{transform:translateX(3px)} }
@keyframes glow-pulse { 0%,100%{ box-shadow:0 0 8px var(--glow-color,#38bdf8)33; } 50%{ box-shadow:0 0 22px var(--glow-color,#38bdf8)66, 0 0 44px var(--glow-color,#38bdf8)22; } }
@keyframes float-up { from { opacity:1; transform:translateY(0) scale(1); } to { opacity:0; transform:translateY(-28px) scale(0.8); } }
@keyframes cash-pop { 0%{ transform:scale(1); } 30%{ transform:scale(1.2); } 100%{ transform:scale(1); } }
@keyframes race-track-scroll { from { background-position: 0 0; } to { background-position: -60px 0; } }
@keyframes star-float { 0%,100%{ transform:translateY(0) rotate(0deg); opacity:0.4; } 50%{ transform:translateY(-8px) rotate(8deg); opacity:0.8; } }
@keyframes lobby-bg { 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }

/* ── GLOBAL BUTTON MICRO-INTERACTIONS ── */
button {
  transition: transform 0.12s ease, filter 0.12s ease, box-shadow 0.12s ease;
}
button:not(:disabled):hover {
  filter: brightness(1.2);
  transform: translateY(-2px);
}
button:not(:disabled):active {
  transform: scale(0.93) translateY(0) !important;
  filter: brightness(0.85) !important;
}

/* input range thumb animate */
input[type=range]::-webkit-slider-thumb {
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.4);
  box-shadow: 0 0 8px currentColor;
}

/* ── CARD DEAL ANIMATION ── */
.card-enter { animation: card-deal 0.3s cubic-bezier(0.34,1.56,0.64,1); }

/* ── NOTIFICATION GLOW ── */
.notif-win { animation: notif-in 0.3s cubic-bezier(0.34,1.56,0.64,1), glow-pulse 1.5s ease infinite; }

/* ── SCROLLBAR HIDE ── */
.hide-scroll { scrollbar-width: none; }
.hide-scroll::-webkit-scrollbar { display: none; }

/* ── PLINKO PEG GLOW ── */
.peg-flash { background: #fbbf24 !important; box-shadow: 0 0 16px #fbbf2488 !important; transition: none !important; }

/* ── MINE SHAKE ── */
.mine-grid-shake { animation: mine-shake 0.55s ease; }

/* ── PRICE SPARKLE ── */
@keyframes price-sparkle { 0%{ opacity:1; transform:scale(1); } 50%{ opacity:.7; transform:scale(1.06); } 100%{ opacity:1; transform:scale(1); } }
.price-up-sparkle { animation: price-sparkle 0.5s ease; color: #4ade80 !important; }
.price-dn-sparkle { animation: price-sparkle 0.5s ease; color: #f87171 !important; }

/* ── SCROLLBAR STYLING ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: #ffffff20; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #ffffff35; }
</style>
</body>
