const WS_URL = "wss://market-wars-server.onrender.com";
const ONLINE_MODE = true; // false = เล่น offline กับ bot เหมือนเดิม

class MWClient {
  constructor(cb) {
    this.cb = cb; this.ws = null; this.ok = false; this.rtimer = null; this.ptimer = null;
  }
  connect() {
    if (!ONLINE_MODE) { this.cb({type:"OFFLINE"}); return; }
    try {
      this.ws = new WebSocket(WS_URL);
      this.ws.onopen = () => {
        this.ok = true;
        this.ptimer = setInterval(() => { if(this.ws?.readyState===1) this.ws.send('{"type":"PING"}'); }, 25000);
        this.cb({type:"CONNECTED"});
      };
      this.ws.onmessage = e => { try { this.cb(JSON.parse(e.data)); } catch{} };
      this.ws.onclose = () => {
        this.ok = false; clearInterval(this.ptimer);
        this.cb({type:"DISCONNECTED"});
        this.rtimer = setTimeout(() => this.connect(), 3000);
      };
      this.ws.onerror = () => { this.ws?.close(); };
    } catch(e) { this.cb({type:"OFFLINE"}); }
  }
  send(type, payload={}) {
    if (this.ws?.readyState === 1) this.ws.send(JSON.stringify({type,...payload}));
  }
  join(nick,code,mode,endMode,target,duration){ this.send("JOIN",{nick,roomCode:code,mode,endMode,target,duration}); }
  ready(){ this.send("READY"); }
  start(){ this.send("START"); }
  buy(assetId,qty){ this.send("TRADE",{action:"buy",assetId,qty}); }
  sell(assetId,qty){ this.send("TRADE",{action:"sell",assetId,qty}); }
  gamble(game,bet,choice){ this.send("GAMBLE",{game,bet,choice}); }
  chat(text){ this.send("CHAT",{text}); }
  getState(){ this.send("GET_STATE"); }
  disconnect(){ clearInterval(this.ptimer); clearTimeout(this.rtimer); this.ws?.close(); }
}

function pickRarity(tbl){
  let r=Math.random()*tbl.reduce((s,x)=>s+x.w,0);
  for(const t of tbl){r-=t.w;if(r<=0)return t;}
  return tbl[tbl.length-1];
}

const fmt = (n) => {
  if (n == null || isNaN(n)) return "฿0";
  const abs = Math.abs(n), sign = n < 0 ? "-" : "";
  if (abs >= 1e6) return `${sign}฿${(abs/1e6).toFixed(2)}M`;
  if (abs >= 1000) return `${sign}฿${(abs/1000).toFixed(1)}K`;
  return `${sign}฿${Math.round(abs).toLocaleString()}`;
};
const fmtP = (a, p) => {
  if (!p) return "–";
  if (a.type === "realestate") return `฿${Math.round(p).toLocaleString()}`;
  return `฿${p.toFixed(2)}`;
};

function AnimNum({ value, color, size=18, bold=true }) {
  const [disp, setDisp] = useState(value);
  const [flash, setFlash] = useState(null);
  const prev = useRef(value);
  useEffect(() => {
    if (value !== prev.current) {
      setFlash(value > prev.current ? "up" : "down");
      setTimeout(() => setFlash(null), 600);
      prev.current = value;
    }
    setDisp(value);
  }, [value]);
  const flashColor = flash==="up" ? "#4ade80" : flash==="down" ? "#f87171" : null;
  return (
    <span style={{
      fontSize:size, fontWeight:bold?900:400,
      color:flashColor||color,
      display:"inline-block",
      transform:flash?"scale(1.08)":"scale(1)",
      transition:"transform 0.2s, color 0.3s",
      fontVariantNumeric:"tabular-nums",
    }}>{fmt(disp)}</span>
  );
}

function Spark({ hist, up, w=64, h=22 }) {
  if (!hist || hist.length < 2) return <div style={{width:w,height:h}}/>;
  const mn=Math.min(...hist), mx=Math.max(...hist), rng=mx-mn||1;
  const pts = hist.map((v,i) => `${(i/(hist.length-1))*w},${h-((v-mn)/rng)*(h-2)+1}`).join(" ");
  const c = up ? "#4ade80" : "#f87171";
  return (
    <svg width={w} height={h} style={{display:"block",flexShrink:0}}>
      <defs>
        <linearGradient id={`sg${up?1:0}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={c} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={c} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#sg${up?1:0})`}/>
      <polyline points={pts} fill="none" stroke={c} strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
}

function WaitingRoom({ session, client, onGo, players, setPlayers }) {
  const [copied,  setCopied]  = useState(false);
  const me = players.find(p => p.isMe);

  const addBot = () => {
    if (players.length >= 8) return;
    setPlayers(p => [...p,{id:`b${p.length}`,name:BOT_NAMES[p.length-1]||`Bot${p.length}`,ready:true,isBot:true}]);
  };
  const toggleReady = () => {
    if (client?.ok) {
      client.ready();
    } else {
      setPlayers(p=>p.map(x=>x.isMe?{...x,ready:!x.ready}:x));
    }
  };
  const canStart = players.length >= 2 && me?.ready;
  const doStart = () => {
    if (client?.ok) {
      client.start();
    } else {
      onGo(players); // offline fallback
    }
  };
  const endLabel = session.endMode==="target" ? `🎯 ${fmt(session.target)}` : `⏱️ ${session.duration/60}min`;

  return (
    <div style={{
      minHeight:"100vh",background:G.bg,
      backgroundImage:"radial-gradient(ellipse 80% 40% at 50% -5%,#0d1f3a,transparent 60%)",
      display:"flex",alignItems:"center",justifyContent:"center",fontFamily:G.font,padding:20,
    }}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:9,letterSpacing:4,color:"#ffffff20",marginBottom:10}}>ROOM CODE</div>
          <div style={{
            fontSize:46,fontWeight:900,letterSpacing:12,marginBottom:10,
            background:"linear-gradient(135deg,#38bdf8,#818cf8)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
          }}>{session.code}</div>
          <button onClick={()=>{try{navigator.clipboard.writeText(session.code)}catch(e){}setCopied(true);setTimeout(()=>setCopied(false),2000);}}
            style={{padding:"5px 16px",borderRadius:20,border:"1px solid #ffffff15",background:"transparent",
              color:copied?"#4ade80":"#ffffff33",cursor:"pointer",fontSize:10,fontFamily:G.font,
          }}>{copied?"✓ Copied!":"Copy Code"}</button>
        </div>

        <div style={{background:G.panel,borderRadius:14,border:`1px solid ${G.border}`,padding:16,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <div style={{fontSize:9,letterSpacing:3,color:"#ffffff20"}}>PLAYERS ({players.length}/8)</div>
            <div style={{fontSize:9,color:"#fbbf2488"}}>{endLabel}</div>
          </div>
          {players.map(p=>(
            <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"9px 12px",borderRadius:9,marginBottom:6,
              background:p.isMe?"#38bdf808":"#ffffff04",
              border:`1px solid ${p.isMe?"#38bdf820":"#ffffff08"}`,
            }}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:14}}>{p.isBot?"🤖":"👤"}</span>
                <span style={{fontSize:12,color:p.isMe?"#38bdf8":p.isBot?"#64748b":"#fff"}}>{p.nick||p.name}</span>
              </div>
              <span style={{fontSize:10,color:p.ready?"#4ade80":"#f87171"}}>
                {p.ready?"✓ Ready":"Waiting"}
              </span>
            </div>
          ))}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <PillBtn onClick={addBot} color="#fbbf24" disabled={players.length>=8}>+ Add Bot</PillBtn>

        <PillBtn onClick={doStart} color="#38bdf8" disabled={!canStart} full size="lg">

function PriceChart({ hist, color, asset }) {
  if (!hist || hist.length < 2) return null;
  const W = 320, H = 130, PAD = 28;
  const mn = Math.min(...hist), mx = Math.max(...hist), rng = mx - mn || 1;
  const pts = hist.map((v,i) => {
    const x = PAD + (i / (hist.length-1)) * (W - PAD*1.5);
    const y = (H - PAD) - ((v - mn) / rng) * (H - PAD*1.8) + 8;
    return [x, y];
  });
  const polyline = pts.map(p => p.join(",")).join(" ");
  const area = `${pts[0][0]},${H-8} ${polyline} ${pts[pts.length-1][0]},${H-8}`;
  const last = hist[hist.length-1], first = hist[0];
  const up = last >= first;
  const pct = ((last - first) / first * 100);
  const hi = Math.max(...hist), lo = Math.min(...hist);

  // Y axis labels
  const yLabels = [mx, (mx+mn)/2, mn];

  return (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:6}}>
        <div style={{fontSize:9,color:"#ffffff33",letterSpacing:2}}>PRICE HISTORY ({hist.length} ticks)</div>
        <div style={{fontSize:11,fontWeight:700,color:up?"#4ade80":"#f87171"}}>
          {up?"▲":"▼"} {Math.abs(pct).toFixed(2)}%
        </div>
      </div>
      <div style={{background:"#ffffff04",borderRadius:10,border:"1px solid #ffffff0a",padding:"8px 4px 4px",position:"relative"}}>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:"block",overflow:"visible"}}>
          {/* grid lines */}
          {[0.25,0.5,0.75].map((f,i)=>(
            <line key={i}
              x1={PAD} y1={8 + f*(H-PAD*1.8)}
              x2={W-PAD*0.5} y2={8 + f*(H-PAD*1.8)}
              stroke="#ffffff08" strokeWidth="1" strokeDasharray="3,4"/>
          ))}
          {/* area fill */}
          <defs>
            <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.18"/>
              <stop offset="100%" stopColor={color} stopOpacity="0.01"/>
            </linearGradient>
          </defs>
          <polygon points={area} fill="url(#cg)"/>
          {/* line */}
          <polyline points={polyline} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
          {/* last dot */}
          <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3.5" fill={color} opacity="0.9"/>
          {/* y labels */}
          {yLabels.map((v,i)=>{
            const yy = i===0?14 : i===1?(H-PAD*0.6)/2+10 : H-12;
            const label = asset.type==="realestate"?`฿${Math.round(v/1000)}K`:`฿${v.toFixed(v<10?2:0)}`;
            return <text key={i} x="2" y={yy} fontSize="7" fill="#ffffff28" fontFamily="monospace">{label}</text>;
          })}
        </svg>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:8}}>
        {[
          {l:"สูงสุด", v: asset.type==="realestate"?`฿${Math.round(hi).toLocaleString()}`:`฿${hi.toFixed(2)}`, c:"#4ade80"},
          {l:"ต่ำสุด", v: asset.type==="realestate"?`฿${Math.round(lo).toLocaleString()}`:`฿${lo.toFixed(2)}`, c:"#f87171"},
          {l:"เปลี่ยน", v:`${up?"+":""}${pct.toFixed(2)}%`, c:up?"#4ade80":"#f87171"},
        ].map(({l,v,c})=>(
          <div key={l} style={{background:"#ffffff06",borderRadius:7,padding:"6px 8px",textAlign:"center",border:"1px solid #ffffff08"}}>
            <div style={{fontSize:8,color:"#ffffff33",marginBottom:2}}>{l}</div>
            <div style={{fontSize:10,fontWeight:700,color:c}}>{v}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CrashModal({ onResult, onClose, maxBet }) {
  const [bet,   setBet]   = useState(Math.min(200,maxBet));
  const [phase, setPhase] = useState("bet");
  const [mult,  setMult]  = useState(1.00);
  const multR = useRef(1.00);
  // crash point: 70% โอกาสครั้งก่อน 1.5x, 20% ก่อน 3x, 10% ไกลกว่า
  const crashRef = useRef(null);
  if (crashRef.current === null) {
    const r = Math.random();
    if (r < 0.25)      crashRef.current = (1.01 + Math.random()*0.39).toFixed(2); // 25%: crash 1.01-1.4
    else if (r < 0.55) crashRef.current = (1.4  + Math.random()*0.80).toFixed(2); // 30%: crash 1.4-2.2
    else if (r < 0.80) crashRef.current = (2.2  + Math.random()*2.30).toFixed(2); // 25%: crash 2.2-4.5
    else               crashRef.current = (4.5  + Math.random()*7.0 ).toFixed(2); // 20%: crash 4.5-11.5
  }
  const intervalR = useRef(null);

  const start = () => {
    setPhase("live");
    intervalR.current = setInterval(()=>{
      multR.current = Math.round((multR.current+0.04)*100)/100;
      setMult(multR.current);
      if(multR.current >= parseFloat(crashRef.current)){
        clearInterval(intervalR.current);
        setPhase("crashed");
      }
    },100);
  };
  const cashOut = () => {
    clearInterval(intervalR.current);
    const profit = Math.round(bet*multR.current-bet);
    onResult({win:true,amount:profit,msg:`💰 Cash Out ×${multR.current.toFixed(2)} +฿${profit}`});
  };
  useEffect(()=>()=>clearInterval(intervalR.current),[]);
  const c = phase==="crashed"?"#f87171":mult<2?"#fbbf24":mult<5?"#4ade80":"#38bdf8";

  return (
    <Modal onClose={()=>{clearInterval(intervalR.current);onResult({win:false,amount:0,msg:"ปิด"})}} title="🚀 Crash Game (฿200)">
      {phase==="bet" && (
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:10,color:"#ffffff33",marginBottom:8}}>จับไว้! Cash Out ก่อน Crash!</div>
          <Label>เดิมพัน</Label>
          <div style={{display:"flex",gap:7,justifyContent:"center",marginBottom:20}}>
            {[100,200,500,1000].filter(v=>v<=maxBet+200).map(v=>(
              <button key={v} onClick={()=>setBet(v)} style={{
                flex:1,padding:"8px 0",borderRadius:8,cursor:"pointer",fontFamily:G.font,fontSize:12,
                border:`1px solid ${bet===v?"#38bdf855":"#ffffff10"}`,
                background:bet===v?"#38bdf810":"transparent",
                color:bet===v?"#38bdf8":"#ffffff33",fontWeight:700,
              }}>฿{v}</button>
            ))}
          </div>
          <button onClick={start} style={{width:"100%",padding:14,borderRadius:10,border:"none",
            background:"linear-gradient(135deg,#1e3a5f,#1e40af)",color:"#38bdf8",
            cursor:"pointer",fontSize:14,fontWeight:900,fontFamily:G.font}}>🚀 เริ่ม!</button>
        </div>
      )}
      {(phase==="live"||phase==="crashed") && (
        <div style={{textAlign:"center",padding:"10px 0"}}>
          <div style={{fontSize:52,fontWeight:900,color:c,marginBottom:8,
            textShadow:`0 0 20px ${c}55`,fontVariantNumeric:"tabular-nums",
          }}>{phase==="crashed"?"💥 CRASH":mult.toFixed(2)+"×"}</div>
          <div style={{color:"#ffffff33",fontSize:11,marginBottom:20}}>
            {phase==="crashed"?`เสีย ฿${bet.toLocaleString()} 💸`:`ถ้า Cash Out ตอนนี้: +฿${Math.max(0,Math.round(bet*mult-bet)).toLocaleString()}`}
          </div>
          {phase==="crashed" && (
            <div style={{background:"#f8717110",border:"1px solid #f8717125",borderRadius:9,padding:"10px 12px",marginBottom:12,textAlign:"left"}}>
              <div style={{fontSize:9,color:"#f8717188"}}>💡 Crash game ในชีวิตจริง</div>
              <div style={{fontSize:10,color:"#ffffff55",marginTop:4,lineHeight:1.6}}>เกม Crash ออกแบบให้คนส่วนใหญ่โลภ รอนานเกินไป แล้วเสียทั้งหมด "House Edge" ทำให้บ้านพนันได้กำไรแน่นอนในระยะยาว</div>
            </div>
          )}
          {phase==="live" ? (
            <button onClick={cashOut} style={{width:"100%",padding:16,borderRadius:10,border:"none",
              background:"linear-gradient(135deg,#14532d,#166534)",color:"#4ade80",
              cursor:"pointer",fontSize:16,fontWeight:900,fontFamily:G.font,
              boxShadow:"0 4px 20px #14532d66"}}>💰 CASH OUT ×{mult.toFixed(2)}</button>
          ) : (
            <button onClick={()=>onResult({win:false,amount:0,msg:`💥 Crash ที่ ${crashRef.current}× เสีย ฿${bet}`})} style={{
              width:"100%",padding:13,borderRadius:10,border:"1px solid #f8717140",
              background:"#f8717110",color:"#f87171",cursor:"pointer",fontSize:13,fontFamily:G.font,fontWeight:700}}>ปิด</button>
          )}
        </div>
      )}
    </Modal>
  );
}

function RouletteModal({ onResult, onClose }) {
  const REDS = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
  const [bet,    setBet]    = useState(150);
  const [choice, setChoice] = useState("red");
  const [numPick,setNumPick]= useState(null);
  const [phase,  setPhase]  = useState("bet");
  const [ball,   setBall]   = useState(null);
  const spin = () => {
    setPhase("spin");
    setTimeout(()=>{
      // Double-zero roulette: 0–38 (38 = "00") → house edge ~5.26%
      const n = Math.floor(Math.random()*39); // 0-36 + "00"=37
      const displayN = n === 37 ? "00" : n;
      setBall(displayN); setPhase("result");
      const isRed=REDS.includes(n), isBlack=n!==0&&n!==37&&!isRed;
      let win=false,amount=0,msg="";
      if(numPick!==null){
        win = n===numPick;
        amount=bet*35;
        msg=win?`🎯 เลข ${displayN}! ×35 = +฿${(bet*35).toLocaleString()}!!`:`❌ ออก ${displayN}`;
      }
      else if(choice==="red"){win=isRed;amount=bet;msg=win?`🔴 แดง! +฿${bet}`:`ออก ${displayN} (ไม่ใช่แดง)`;}
      else if(choice==="black"){win=isBlack;amount=bet;msg=win?`⚫ ดำ! +฿${bet}`:`ออก ${displayN} (ไม่ใช่ดำ)`;}
      else if(choice==="zero"){win=n===0||n===37;amount=bet*17;msg=win?`0️⃣ ZERO!! +฿${bet*17}`:`❌ ออก ${displayN}`;}
      setTimeout(()=>onResult({win,amount:win?amount:0,msg}),1000);
    },1500);
  };
  return (
    <Modal onClose={()=>onResult({win:false,amount:0,msg:"ปิด"})} title="🎰 รูเล็ต">
      {phase==="bet" && (
        <div>

          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {[100,150,300,500].map(v=>(
              <button key={v} onClick={()=>setBet(v)} style={{flex:1,padding:"7px 0",borderRadius:7,cursor:"pointer",fontFamily:G.font,fontSize:11,
                border:`1px solid ${bet===v?"#f472b655":"#ffffff10"}`,background:bet===v?"#f472b612":"transparent",
                color:bet===v?"#f472b6":"#ffffff28",fontWeight:700}}>฿{v}</button>
            ))}
          </div>
          <Label>เลือกเดิมพัน</Label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:12}}>
            {[{k:"red",l:"🔴 แดง",c:"#ef4444"},{k:"black",l:"⚫ ดำ",c:"#6b7280"},{k:"zero",l:"0/00 Zero",c:"#4ade80"}].map(({k,l,c})=>(
              <button key={k} onClick={()=>{setChoice(k);setNumPick(null);}} style={{padding:"10px 4px",borderRadius:8,cursor:"pointer",fontFamily:G.font,fontSize:11,fontWeight:700,
                border:`1px solid ${choice===k&&numPick===null?c+"55":"#ffffff10"}`,
                background:choice===k&&numPick===null?`${c}18`:"transparent",
                color:choice===k&&numPick===null?c:"#ffffff33"}}>{l}</button>
            ))}
          </div>
          <Label>หรือเดิมพันเลข (×35)</Label>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
            {[0,7,11,13,17,21,27,32,36].map(n=>(
              <button key={n} onClick={()=>{setNumPick(n);setChoice(null);}} style={{width:38,height:36,borderRadius:7,cursor:"pointer",fontFamily:G.font,fontSize:11,fontWeight:700,
                border:`1px solid ${numPick===n?"#ffd70066":"#ffffff10"}`,
                background:numPick===n?"#ffd70018":REDS.includes(n)?"#ef444412":"#6b728010",

          </div>
          <button onClick={spin} style={{width:"100%",padding:14,borderRadius:10,border:"none",
            background:"linear-gradient(135deg,#4c1d95,#6d28d9)",color:"#c4b5fd",
            cursor:"pointer",fontSize:14,fontWeight:900,fontFamily:G.font}}>🎰 หมุน! (฿{bet})</button>
        </div>
      )}
      {(phase==="spin"||phase==="result") && (

          {phase==="result"&&ball!==null && (

          <div style={{fontSize:44,fontWeight:900,lineHeight:1,
            color:myRank===1?"#ffd700":myRank===2?"#e2e8f0":myRank===3?"#cd7f32":"#64748b",
          }}>#{myRank}</div>
          {winner && <div style={{fontSize:10,color:"#fbbf24",marginTop:6}}>🎯 Winner: {winner}</div>}
        </div>

        <div style={{background:G.panel,borderRadius:16,border:`1px solid ${G.border}`,padding:18,marginBottom:14}}>
          <div style={{fontSize:9,letterSpacing:3,color:"#ffffff20",marginBottom:10}}>NET WORTH สุดท้าย</div>
          <div style={{fontSize:38,fontWeight:900,color:pnl>=0?"#4ade80":"#f87171",marginBottom:4}}>{fmt(myNW)}</div>
          <div style={{fontSize:13,color:pnl>=0?"#4ade8088":"#f8717188"}}>
            {pnl>=0?"+":""}{fmt(pnl)} ({pct}%)
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {l:"💵 เงินสด",v:cash,c:"#38bdf8"},
            {l:"📈 หุ้น+Crypto+ทอง",v:stockVal+cryptoVal+goldVal+commVal,c:"#4ade80"},
            {l:"🏠 อสังหาฯ",v:realVal,c:"#fbbf24"},
            {l:"🎲 Gambling W/L",v:`+${fmt(gWin)} / -${fmt(gLoss)}`,c:"#c084fc",raw:true},
          ].map(({l,v,c,raw})=>(
            <div key={l} style={{background:"#ffffff06",borderRadius:10,padding:"12px 14px",border:"1px solid #ffffff08"}}>
              <div style={{fontSize:9,color:"#ffffff33",marginBottom:4}}>{l}</div>
              <div style={{fontSize:13,fontWeight:700,color:c}}>{raw?v:fmt(v)}</div>
            </div>
          ))}
        </div>

        <div style={{background:G.panel,borderRadius:14,border:`1px solid ${G.border}`,padding:14,marginBottom:20}}>
          <div style={{fontSize:9,letterSpacing:3,color:"#ffffff20",marginBottom:10}}>LEADERBOARD</div>
          {allPlayers.map((p,i)=>(
            <div key={p.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"8px 10px",borderRadius:8,marginBottom:5,
              background:p.isMe?"#38bdf808":"transparent",
              border:`1px solid ${p.isMe?"#38bdf818":"transparent"}`,
            }}>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:13,minWidth:20,color:i===0?"#ffd700":i===1?"#e2e8f0":i===2?"#cd7f32":"#ffffff33"}}>
                  {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
                </span>
                <span style={{fontSize:11,color:p.isMe?"#38bdf8":"#ffffff66"}}>{p.nick||p.name}</span>
              </div>
              <span style={{fontSize:11,fontWeight:700,color:p.nw>=start?"#4ade80":"#f87171"}}>{fmt(p.nw)}</span>
            </div>
          ))}
        </div>

        <button onClick={onRestart} style={{width:"100%",padding:16,borderRadius:12,border:"none",
          background:"linear-gradient(135deg,#0c4a6e,#1e40af)",color:"#38bdf8",
          cursor:"pointer",fontSize:14,fontWeight:900,fontFamily:G.font,
          boxShadow:"0 4px 20px #0c4a6e55",
        }}>🔄 เล่นอีกครั้ง</button>
      </div>
    </div>
  );
}

// ── GAME SCREEN ──
function GameScreen({ session, initPlayers, client, onEnd }) {
  const cfg       = MODES[session.mode];
  const gameAssets= ASSETS;

  const cashR      = useRef(cfg.start);
  const holdR      = useRef({});
  const basisR     = useRef({});
  const priceR     = useRef(Object.fromEntries(gameAssets.map(a=>[a.id,a.bp])));
  const histR      = useRef(Object.fromEntries(gameAssets.map(a=>[a.id,[a.bp]])));
  const frozenR    = useRef(false);
  const evR        = useRef(null);
  const evTimerR   = useRef(0);
  const nextEvR    = useRef(18);
  const nextCardR  = useRef(35);
  const botsR      = useRef(initPlayers.filter(p=>!p.isMe).map(p=>({
    ...p, cash:cfg.start, hold:{}, nw:cfg.start,
  })));
  const tickR      = useRef(0);
  const gWinR      = useRef(0);
  const gLossR     = useRef(0);
  const doneR      = useRef(false);

  const [cash,     setCash]    = useState(cfg.start);
  const [hold,     setHold]    = useState({});
  const [basis,    setBasis]   = useState({});
  const [prices,   setPrices]  = useState(priceR.current);
  const [bots,     setBots]    = useState(botsR.current);
  const [timeLeft, setTimeLeft]= useState(session.duration||cfg.dur);
  const [phase,    setPhase]   = useState("BULL");
  const [activeEv, setActiveEv]= useState(null);
  const [evTimer,  setEvTimer] = useState(0);
  const [frozen,   setFrozen]  = useState(false);
  const [cards,    setCards]   = useState(cfg.cards?[PCARDS[0]]:[]);
  const [intelEv,  setIntelEv] = useState(null);
  const [notif,    setNotif]   = useState(null);
  const [selAsset, setSelAsset]= useState(null);
  const [catFilter,setCatFilter]= useState("all");
  const [tab,      setTab]     = useState("market");
  const [modal,    setModal]   = useState(null);
  const [gWin,     setGWin]    = useState(0);
  const [gLoss,    setGLoss]   = useState(0);
  const hypeInvR   = useRef([]);
  const mktplaceR  = useRef([]);
  const chatR      = useRef([]);
  const hypeIdxR   = useRef({card:1.0,figure:1.0,gameid:1.0});
  const [hypeIdx,    setHypeIdx]   = useState({card:1.0,figure:1.0,gameid:1.0});
  const [hypeInv,    setHypeInv]   = useState([]);
  const [mktplace,   setMktplace]  = useState([]);
  const [chatMsgs,   setChatMsgs]  = useState([]);
  const [chatInput,  setChatInput] = useState("");
  const [listModal,  setListModal] = useState(null);
  const [board,      setBoard]      = useState([]);
  const onlineRef = useRef(!!(client?.ok));

  // ── ONLINE: รับ messages จาก server ──
  useEffect(() => {
    if (!client || !client.ok) { onlineRef.current=false; return; }
    onlineRef.current = true;
    // request state ตั้งแต่เริ่ม
    client.getState();
    // override cb ให้ handle game messages ด้วย
    const origCb = client.cb;
    client.cb = (msg) => {
      origCb(msg); // ส่ง global messages ต่อ
      switch(msg.type) {
        case "TICK":
          if(msg.prices){ priceR.current={...msg.prices}; setPrices({...msg.prices}); }
        if(msg.prices){
    Object.entries(msg.prices).forEach(([id,p])=>{
      if(!histR.current[id]) histR.current[id]=[];
      histR.current[id]=[...histR.current[id],p].slice(-60);
    });
  }
          if(msg.timeLeft!==undefined) setTimeLeft(msg.timeLeft);
          if(msg.phase) setPhase(msg.phase);
          if(msg.activeEvent!==undefined) setActiveEv(msg.activeEvent);
          if(msg.eventTimer!==undefined) setEvTimer(msg.eventTimer);
          if(msg.hypeIdx) { hypeIdxR.current={...msg.hypeIdx}; setHypeIdx({...msg.hypeIdx}); }
          if(msg.board) setBoard(msg.board);
          break;
        case "TRADE_RESULT":
          if(msg.ok){
            cashR.current=msg.cash; holdR.current={...msg.hold};
            setCash(msg.cash); setHold({...msg.hold});
            showNotif(msg.action==="buy"
              ? `▲ ซื้อ ×${msg.qty} −${fmt(msg.cost)}`
              : `▼ ขาย ×${msg.qty} +${fmt(msg.gain)}`,
              msg.action==="buy"?"#4ade80":"#38bdf8");
          } else { showNotif(`❌ ${msg.msg}`,"#f87171"); }
          setModal(null);
          break;
        case "INCOME":
          cashR.current+=msg.amount; setCash(cashR.current);
          showNotif(msg.msg,"#fbbf24");
          break;
        case "EVENT":
          setActiveEv(msg.event);
          showNotif(msg.event.title,"#fbbf24");
          break;
        case "MINI_EVENT":
          if(msg.assetId&&priceR.current[msg.assetId]){
            priceR.current[msg.assetId]*=(1+msg.change);
            setPrices({...priceR.current});
          }
          showNotif(msg.msg,msg.change>0?"#4ade80":"#f87171");
          break;
        case "GAMBLE_RESULT":
          if(msg.ok){
            cashR.current=msg.cash; setCash(msg.cash);
            gWinR.current=msg.gWin||0; gLossR.current=msg.gLoss||0;
            setGWin(gWinR.current); setGLoss(gLossR.current);
            showNotif(msg.msg,msg.win?"#4ade80":"#f87171");
          } else { showNotif(`❌ ${msg.msg}`,"#f87171"); setModal(null); }
          break;
        case "CHAT":
          if(msg.msg){
            const m=msg.msg;
            chatR.current=[...chatR.current.slice(-60),{id:m.id,player:m.nick,text:m.text,isMe:m.nick===session.nick,time:m.time}];
            setChatMsgs([...chatR.current]);
          }
          break;
        case "PLAYER_DISCONNECTED":
          showNotif(`${msg.nick} หลุดออกจากเกม`,"#f87171");
          break;
        case "REJOINED":
          cashR.current=msg.cash||cashR.current; holdR.current=msg.hold||{};
          setCash(cashR.current); setHold({...holdR.current});
          if(msg.prices){ priceR.current={...msg.prices}; setPrices({...msg.prices}); }
          break;
      }
    };
    return () => { client.cb = origCb; };
  }, [client, session.nick]);

  const showNotif = useCallback((msg, color="#4ade80") => {
    setNotif({msg,color,id:Date.now()});
    setTimeout(()=>setNotif(null),2500);
  },[]);

  const syncCash = () => setCash(cashR.current);
  const syncHold = () => setHold({...holdR.current});
  const syncBasis= () => setBasis({...basisR.current});
  const myNW = () => calcNW(cashR.current, holdR.current, priceR.current);

  const addChatMsg = useCallback((player, text, isMe=false) => {
    const msg = {id:`c${Date.now()}${Math.random().toString(36).slice(2,4)}`,player,text,isMe,time:Date.now()};
    chatR.current = [...chatR.current.slice(-60), msg];
    setChatMsgs([...chatR.current]);
  },[]);

  const openBox = (type) => {
    const costs = {card:200,figure:800,gameid:400};
    const cost = costs[type];
    if(cashR.current < cost){ showNotif("❌ เงินไม่พอ","#f87171"); return; }
    cashR.current -= cost; syncCash();
    const item = genHypeItem(type);
    hypeInvR.current = [...hypeInvR.current, item];
    setHypeInv([...hypeInvR.current]);
    showNotif(`📦 ได้ ${item.emoji} ${item.name}`, item.rarityColor);
    addChatMsg(session.nick, `ได้ ${item.emoji} ${item.name} มา!`, true);
  };

  const sellHypeItem = (item) => {
    const market = Math.round(item.bp*(hypeIdxR.current[item.type]||1));
    const val = Math.round(market * HYPE_DEALER_CUT);
    cashR.current += val; syncCash();
    hypeInvR.current = hypeInvR.current.filter(i=>i.id!==item.id);
    setHypeInv([...hypeInvR.current]);
    showNotif(`💰 ขายทิ้ง ${item.name} +${fmt(val)} (โดน cut ${Math.round((1-HYPE_DEALER_CUT)*100)}%)`, "#94a3b8");
  };

  const listItem = (item, price) => {
    const listing = {id:`lm${Date.now()}`,itemId:item.id,seller:session.nick,sellerIsMe:true,item,price};
    mktplaceR.current = [...mktplaceR.current, listing];
    setMktplace([...mktplaceR.current]);
    hypeInvR.current = hypeInvR.current.map(i=>i.id===item.id?{...i,listed:true,listPrice:price}:i);
    setHypeInv([...hypeInvR.current]);
    setListModal(null);
    showNotif(`🏪 ลงขาย ${item.name} ฿${price.toLocaleString()}`, "#fbbf24");
  };

  const delistItem = (item) => {
    mktplaceR.current = mktplaceR.current.filter(l=>l.itemId!==item.id);
    setMktplace([...mktplaceR.current]);
    hypeInvR.current = hypeInvR.current.map(i=>i.id===item.id?{...i,listed:false,listPrice:null}:i);
    setHypeInv([...hypeInvR.current]);
    showNotif("↩️ ยกเลิกลงขายแล้ว","#94a3b8");
  };

  const buyMarketItem = (listing) => {
    if(cashR.current < listing.price){ showNotif("❌ เงินไม่พอ","#f87171"); return; }
    cashR.current -= listing.price; syncCash();
    const newItem = {...listing.item, id:`h${Date.now()}`, listed:false, listPrice:null};
    hypeInvR.current = [...hypeInvR.current, newItem];
    setHypeInv([...hypeInvR.current]);
    mktplaceR.current = mktplaceR.current.filter(l=>l.id!==listing.id);
    setMktplace([...mktplaceR.current]);
    showNotif(`🛒 ซื้อ ${listing.item.name} ฿${listing.price.toLocaleString()}`, "#38bdf8");
    if(!listing.sellerIsMe) addChatMsg(listing.seller, `ขาย ${listing.item.emoji}${listing.item.name} ได้แล้ว! 🎉`);
  };

  const sendChat = () => {
    if(!chatInput.trim()) return;
    if (onlineRef.current && client?.ok) {
      addChatMsg(session.nick, chatInput.trim(), true); // แสดงเองก่อน
      client.chat(chatInput.trim());
    } else {
      addChatMsg(session.nick, chatInput.trim(), true);
      if(Math.random()<0.35 && botsR.current.length>0){
        const bot = botsR.current[Math.floor(Math.random()*botsR.current.length)];
        const replies=["555","ดีเลย!","โอเค","เห็นด้วย","จริงด้วย","ฮ่าๆๆ","ขายหุ้นก่อนนะ","น่าสนใจ","โชคดีด้วย!","ฉันก็คิดแบบนั้น"];
        setTimeout(()=>addChatMsg(bot.name,replies[Math.floor(Math.random()*replies.length)]),600+Math.random()*1400);
      }
    }
    setChatInput("");
  };

  const stockVal  = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="stock")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const cryptoVal = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="crypto")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const realVal   = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="realestate")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const goldVal   = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="gold")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const commVal   = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="commodity")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const displayNW = cash + stockVal + cryptoVal + realVal + goldVal + commVal;

  const botTick = useCallback(() => {
    botsR.current = botsR.current.map(bot => {
      if (Math.random() > 0.28) return bot;
      const a = gameAssets[Math.floor(Math.random()*gameAssets.length)];
      const p = priceR.current[a.id]||a.bp;
      const mq= Math.max(1, Math.floor(bot.cash*0.12/p));
      let {cash:bc, hold:bh} = bot;
      if (Math.random()>0.48 && bc>=p*mq) {
        bc-=p*mq; bh={...bh,[a.id]:(bh[a.id]||0)+mq};
      } else if ((bh[a.id]||0)>=1) {
        const sq=Math.min(bh[a.id],mq); bc+=p*sq; bh={...bh,[a.id]:bh[a.id]-sq};
      }
      return {...bot, cash:bc, hold:bh, nw:calcNW(bc,bh,priceR.current)};
    });
    setBots([...botsR.current]);
  },[gameAssets]);

  const endGame = useCallback((winnerName=null) => {
    if (doneR.current) return;
    doneR.current = true;
    const finalNW = calcNW(cashR.current, holdR.current, priceR.current);
    onEnd({
      myNW: finalNW, cash:cashR.current, stockVal, cryptoVal, realVal, goldVal, commVal,
      gWin:gWinR.current, gLoss:gLossR.current, bots:botsR.current, winner:winnerName,
    });
  },[onEnd, stockVal, cryptoVal, realVal, goldVal, commVal]);

  // รับ GAME_OVER จาก server
  useEffect(() => {
    if (!client) return;
    const prevCb = client.cb;
    const handler = (msg) => {
      prevCb(msg);
      if (msg.type==="GAME_OVER" && !doneR.current) {
        doneR.current = true;
        const myEntry = msg.board?.find(p=>p.nick===session.nick);
        const finalNW = myEntry?.nw || calcNW(cashR.current,holdR.current,priceR.current);
        const serverBots = (msg.board||[]).filter(p=>p.nick!==session.nick)
          .map(p=>({name:p.nick,nw:p.nw}));
        onEnd({
          myNW:finalNW, cash:cashR.current, stockVal,cryptoVal,realVal,goldVal,commVal,
          gWin:gWinR.current, gLoss:gLossR.current,
          bots: serverBots, winner:msg.winner,
        });
      }
    };
    client.cb = handler;
    return () => { client.cb = prevCb; };
  }, [client, session.nick, onEnd]);

  useEffect(() => {
    // online mode: server รัน loop — client แค่ render จาก TICK messages
    if (onlineRef.current && client?.ok) return;

    const id = setInterval(() => {
      tickR.current++;
      setTimeLeft(t => {
        if (t <= 1) { clearInterval(id); endGame(); return 0; }
        const nt = t-1;
        const pct = nt/(session.duration||cfg.dur);
        setPhase(pct>0.66?"BULL":pct>0.33?"SIDEWAYS":"BEAR");
        return nt;
      });

      if (!frozenR.current && tickR.current % 2 === 0) {
        const ev = evR.current;
        gameAssets.forEach(a => {
          const eff = ev ? (ev.eff[a.type]||0) : 0;
          const prev = priceR.current[a.id]||a.bp;
          priceR.current[a.id] = Math.max(
            prev * (1 + eff*0.07 + (Math.random()-0.5)*1.2*a.vol),
            a.bp * 0.04
          );
          histR.current[a.id] = [...(histR.current[a.id]||[]), priceR.current[a.id]].slice(-60);
        });
        setPrices({...priceR.current});
      }

      nextEvR.current--;
      if (nextEvR.current <= 0) {
        const ev = EVENTS[Math.floor(Math.random()*EVENTS.length)];
        evR.current = ev; evTimerR.current = ev.dur;
        setActiveEv(ev); setEvTimer(ev.dur);
        showNotif(ev.title, "#fbbf24");
        // RE/Gold ได้ income bonus เมื่อ event ดีๆ เกิด
        if((ev.eff.realestate||0)>0.1){
          const bonus=["CONDO","HOUSE","MALL"].reduce((s,id)=>s+((holdR.current[id]||0)*(ASSETS.find(a=>a.id===id)||{inc:0}).inc*3),0);
          if(bonus>0){cashR.current+=bonus;syncCash();showNotif(`🏘️ อสังหาฯบูม! ค่าเช่าพิเศษ +${fmt(bonus)}`,"#fbbf24");}
        }
        if((ev.eff.gold||0)>0.1){
          const bonus=["GOLD","SILV"].reduce((s,id)=>s+((holdR.current[id]||0)*(ASSETS.find(a=>a.id===id)||{inc:0}).inc*5),0);
          if(bonus>0){cashR.current+=bonus;syncCash();showNotif(`✨ ทองบูม! ปันผลพิเศษ +${fmt(bonus)}`,"#f59e0b");}
        }
        const [lo,hi] = cfg.evInt;
        nextEvR.current = Math.floor(Math.random()*(hi-lo))+lo;
        if(botsR.current.length>0){
          const cb=botsR.current[Math.floor(Math.random()*botsR.current.length)];
          const cmt=[`${ev.title} !!`,Math.random()<0.5?"รีบซื้อ!":"ระวังด้วยนะ!","โอ้โห แรงมาก!","ใครรู้ล่วงหน้าเนี่ย 😂"][Math.floor(Math.random()*4)];
          setTimeout(()=>addChatMsg(cb.name,cmt),400+Math.random()*800);
        }
      }
      if (evTimerR.current > 0) {
        evTimerR.current--;
        setEvTimer(evTimerR.current);
        if (evTimerR.current <= 0) { evR.current=null; setActiveEv(null); }
      }

      if (cfg.cards) {
        nextCardR.current--;
        if (nextCardR.current <= 0) {
          const c = PCARDS[Math.floor(Math.random()*PCARDS.length)];
          setCards(prev => prev.length<3?[...prev,c]:prev);
          nextCardR.current = cfg.cards ? 35 : 55;
        }
      }

      if (tickR.current % 30 === 0) {
        const incomeAssets = gameAssets.filter(a=>a.inc);
        incomeAssets.forEach(a=>{
          const q = holdR.current[a.id]||0;
          if (q > 0) {
            const earned = a.inc * q;
            cashR.current += earned;
            syncCash();
            const icon = a.type==="realestate"?"🏠":a.type==="gold"?"✨":"📦";
            const label = a.type==="realestate"?"ค่าเช่า":a.type==="gold"?"ปันผลทอง":"ปันผล";
            showNotif(`${icon} ${label} ${a.name} +${fmt(earned)}`, a.type==="realestate"?"#fbbf24":a.type==="gold"?"#f59e0b":"#86efac");
          }
        });
      }

      botTick();

      // Mini-events every 20s — กระทบ 1 asset เพิ่มความตื่นเต้นระหว่าง main events
      if (tickR.current % 20 === 0 && !evR.current) {
        const miniEvts=[
          {id:"m1",a:"AAPL",msg:"🍎 Apple รายได้ดี!",   ch:+0.06},
          {id:"m2",a:"TSLA",msg:"⚡ Tesla delivery สูง!",ch:+0.08},
          {id:"m3",a:"BTC", msg:"₿ BTC ขยับขึ้น",       ch:+0.07},
          {id:"m4",a:"ETH", msg:"◆ ETH network active",  ch:+0.09},
          {id:"m5",a:"SOL", msg:"◎ SOL dApps เยอะขึ้น",  ch:+0.10},
          {id:"m6",a:"GOLD",msg:"🥇 ทองขึ้นเล็กน้อย",    ch:+0.05},
          {id:"m7",a:"OIL", msg:"🛢 น้ำมันปรับตัวสูง",   ch:+0.08},

        ['card','figure','gameid'].forEach(t=>{
          const pull=(1.05 - hypeIdxR.current[t])*0.04; // ดึงกลับสู่ 0.62
          const noise=(Math.random()-0.5)*0.28;
          hypeIdxR.current[t]=Math.max(0.25,Math.min(5.5,hypeIdxR.current[t]+pull+noise));
        });
        setHypeIdx({...hypeIdxR.current});
      }

      // Hype events every 22 ticks (35% chance) — crash มากกว่า pump
      if(tickR.current % 22 === 0 && Math.random()<0.35){
        const hypeEvts=[
          {t:"card",   msg:"🃏 Card Hype! การ์ดร้อนแรง!",    mult:1.6},
          {t:"figure", msg:"🎎 Figure Boom! ฟิกเกอร์บูม!",    mult:1.5},

          {t:"figure", msg:"🎎 Collab! ฟิกฯ Limited พุ่ง!",   mult:1.8},
          {t:"gameid", msg:"🎮 Pro Season! ไอดีแพงขึ้น!",     mult:1.7},
          {t:"card",   msg:"🃏 Card Dump! การ์ดราคาตก",        mult:0.55},
          {t:"figure", msg:"🎎 Figure Crash! ราคาดิ่ง",        mult:0.58},
          {t:"gameid", msg:"🎮 Game Dead! ไอดีราคาร่วง",       mult:0.50},
          {t:"card",   msg:"🃏 การ์ดล้นตลาด ลงหนัก",           mult:0.45},
          {t:"figure", msg:"🎎 โรงงานทุ่มตลาด ฟิกฯ ร่วง",     mult:0.48},
          {t:"gameid", msg:"🎮 Account Ban Wave! ไอดีตก",      mult:0.42},
        ];
        const hev=hypeEvts[Math.floor(Math.random()*hypeEvts.length)];
        hypeIdxR.current[hev.t]=Math.min(6.0,Math.max(0.15,hypeIdxR.current[hev.t]*hev.mult));
        setHypeIdx({...hypeIdxR.current});
        showNotif(hev.msg,"#c084fc");
      }

      // Bot marketplace: buy player listings & list own items (every 10 ticks)
      if(tickR.current % 10 === 0){
        const playerListings=mktplaceR.current.filter(l=>l.sellerIsMe);
        playerListings.forEach(listing=>{
          const fairV=listing.item.bp*(hypeIdxR.current[listing.item.type]||1);
          if(Math.random()<0.10 && listing.price<=fairV*0.92 && botsR.current.length>0){
            const buyer=botsR.current[Math.floor(Math.random()*botsR.current.length)];
            cashR.current+=listing.price; syncCash();
            mktplaceR.current=mktplaceR.current.filter(l=>l.id!==listing.id);
            setMktplace([...mktplaceR.current]);
            hypeInvR.current=hypeInvR.current.filter(i=>i.id!==listing.itemId);
            setHypeInv([...hypeInvR.current]);
            showNotif(`🤝 ${buyer.name} ซื้อ ${listing.item.name} +฿${listing.price.toLocaleString()}`,"#4ade80");
            addChatMsg(buyer.name,`ได้ ${listing.item.emoji}${listing.item.name} มาแล้ว!`);
          }
        });
        // Bots add own listings
        if(Math.random()<0.15 && botsR.current.length>0 && mktplaceR.current.filter(l=>!l.sellerIsMe).length<8){
          const bot=botsR.current[Math.floor(Math.random()*botsR.current.length)];
          const types=['card','figure','gameid'];
          const t=types[Math.floor(Math.random()*types.length)];
          const item=genHypeItem(t);
          const fairV=item.bp*(hypeIdxR.current[t]||1);
          const price=Math.round(fairV*(0.7+Math.random()*0.55));
          const listing={id:`lm${Date.now()}${Math.random().toString(36).slice(2,4)}`,itemId:item.id,seller:bot.name,sellerIsMe:false,item,price};
          mktplaceR.current=[...mktplaceR.current,listing];
          setMktplace([...mktplaceR.current]);
        }
      }

      // Bot random chat every 7 ticks (18% chance)
      if(tickR.current % 7 === 0 && Math.random()<0.18 && botsR.current.length>0){
        const bot=botsR.current[Math.floor(Math.random()*botsR.current.length)];
        addChatMsg(bot.name,BOT_CHAT_POOL[Math.floor(Math.random()*BOT_CHAT_POOL.length)]);
      }

      if (session.endMode==="target" && session.target) {
        if (myNW() >= session.target) { clearInterval(id); endGame(session.nick); return; }
        for (const b of botsR.current) {
          if (b.nw >= session.target) { clearInterval(id); endGame(b.name); return; }
        }

    }, 1000);
    return () => clearInterval(id);

    // offline

    const cost = p * q;
    if (cashR.current < cost) { showNotif("❌ เงินไม่พอ","#f87171"); return; }
    cashR.current -= cost;
    holdR.current[selAsset.id] = (holdR.current[selAsset.id]||0)+q;
    basisR.current[selAsset.id] = (basisR.current[selAsset.id]||0)+cost;
    syncCash(); syncHold(); syncBasis();
    showNotif(`▲ ซื้อ ${selAsset.name} ×${q}  −${fmt(cost)}`, "#4ade80");
    setModal(null);

    const p = priceR.current[selAsset.id]||selAsset.bp;
    const gain = p * q;
    cashR.current += gain;
    holdR.current[selAsset.id] = have - q;
    const avgCost = (basisR.current[selAsset.id]||0) / Math.max(have,1) * q;
    basisR.current[selAsset.id] = Math.max(0, (basisR.current[selAsset.id]||0) - avgCost);

      {modal==="sell" && selAsset && <SellModal asset={selAsset} price={selP} maxQty={selHave} onSell={doSell} onClose={()=>setModal(null)} hist={selHist}/>}
      {modal==="lottery"  && <LotteryModal  onResult={handleGambleResult} onClose={()=>cancelGamble("lottery")}/>}
      {modal==="scratch"  && <ScratchModal  onResult={handleGambleResult} onClose={()=>cancelGamble("scratch")}/>}
      {modal==="crash"    && <CrashModal    onResult={handleGambleResult} onClose={()=>cancelGamble("crash")} maxBet={cash}/>}
      {modal==="flip"     && <FlipModal     onResult={handleGambleResult} onClose={()=>cancelGamble("flip")}/>}
      {modal==="roulette" && <RouletteModal onResult={handleGambleResult} onClose={()=>cancelGamble("roulette")}/>}
    </div>
  );
}

// ── APP ROOT ──
function App() {
  const [screen,  setScreen]  = useState("lobby");
  const [session, setSession] = useState(null);
  const [players, setPlayers] = useState([]);
  const [result,  setResult]  = useState(null);
  const [wsReady, setWsReady] = useState(!ONLINE_MODE);
  const [wsError, setWsError] = useState(null);
  const clientRef = useRef(null);

  // init WS client ครั้งเดียว
  useEffect(() => {
    const client = new MWClient((msg) => {
      if (msg.type === "CONNECTED")   { setWsReady(true); setWsError(null); }
      if (msg.type === "OFFLINE")     { setWsReady(false); setWsError("ไม่สามารถเชื่อมต่อ server ได้ — เล่น offline แทน"); }
      if (msg.type === "DISCONNECTED"){ setWsReady(false); setWsError("หลุดการเชื่อมต่อ กำลัง reconnect..."); }

      if (msg.type === "JOINED") {
        setSession(s => ({...s, playerId:msg.playerId, isHost:msg.isHost,
          mode:msg.mode, endMode:msg.endMode, target:msg.target, duration:msg.duration}));
        setPlayers(msg.players.map(p=>({...p,isMe:p.id===msg.playerId})));
        setScreen("waiting");
      }
if (msg.type === "PLAYER_JOINED") {
  setPlayers(p => {
    const exists = p.find(x => x.id===msg.playerId);
    if (exists) return p;
    return [...p, {id:msg.playerId, nick:msg.nick, ready:false, isMe:false}];
  });
}
if (msg.type === "PLAYERS_UPDATE") {
  setPlayers(msg.players.map(p => ({
    ...p, isMe: p.nick===session?.nick,
  })));
}
      if (msg.type === "GAME_START") {
        setScreen("game");
      }
      if (msg.type === "GAME_OVER") {
        setResult({...msg, fromServer:true});
        setScreen("result");
      }
    });
    clientRef.current = client;
    client.connect();
    return () => client.disconnect();
  }, []);

const handleLobbyStart = (s) => {
  if (ONLINE_MODE && clientRef.current?.ok) {
    setSession(s);
    clientRef.current.join(s.nick, s.code, s.mode, s.endMode, s.target, s.duration);
    setScreen("waiting");
  } else {
    setSession(s); setScreen("waiting");
  }
};

  if (screen==="lobby") return (
    <>
      {ONLINE_MODE && (
        <div style={{
          position:"fixed",top:0,left:0,right:0,zIndex:9999,
          padding:"6px 16px",textAlign:"center",fontSize:10,
          background: wsReady?"#4ade8020":"#f8717120",
          color: wsReady?"#4ade80":"#f87171",
          borderBottom: `1px solid ${wsReady?"#4ade8030":"#f8717130"}`,
          fontFamily:"'IBM Plex Mono',monospace",
        }}>
          {wsReady ? "🟢 เชื่อมต่อ Server แล้ว — Online Multiplayer พร้อม" : (wsError||"⏳ กำลังเชื่อมต่อ Server...")}
        </div>
      )}
      <Lobby onStart={handleLobbyStart} wsReady={wsReady||!ONLINE_MODE}/>
    </>
  );
  if (screen==="waiting") return (
<WaitingRoom session={session} client={clientRef.current} players={players} setPlayers={setPlayers} onGo={ps=>{ setPlayers(ps); setScreen("game"); }}/>
  );
  if (screen==="game") return (
    <GameScreen session={session} initPlayers={players} client={clientRef.current} onEnd={r=>{ setResult(r); setScreen("result"); }}/>
  );
  if (screen==="result") return (
  <ResultScreen result={result} session={session} onRestart={()=>{ setResult(null); setSession(null); setPlayers([]); setScreen("lobby"); }}/>
);
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
