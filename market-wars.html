  const [cards,    setCards]   = useState(cfg.cards?[PCARDS[0]]:[]);
  const [intelEv,  setIntelEv] = useState(null);
  const [notif,    setNotif]   = useState(null);
  const [selAsset, setSelAsset]= useState(null);
  const [catFilter,setCatFilter]= useState("all");
  const [tab,      setTab]     = useState("market");
  const [modal,    setModal]   = useState(null);
  const [gWin,     setGWin]    = useState(0);
  const [gLoss,    setGLoss]   = useState(0);
  const hypeInvR   = useRef([]);
  const mktplaceR  = useRef([]);
  const chatR      = useRef([]);
  const hypeIdxR   = useRef({card:1.0,figure:1.0,gameid:1.0});
  const boxStockR  = useRef({card:Math.floor(Math.random()*8)+3,figure:Math.floor(Math.random()*6)+2,gameid:Math.floor(Math.random()*7)+2});
  const boxTimerR  = useRef(120);
  const [hypeIdx,    setHypeIdx]   = useState({card:1.0,figure:1.0,gameid:1.0});
  const [hypeInv,    setHypeInv]   = useState([]);
  const [mktplace,   setMktplace]  = useState([]);
  const [boxStock,   setBoxStock]  = useState({...boxStockR.current});
  const [boxTimer,   setBoxTimer]  = useState(120);
  const [chatMsgs,   setChatMsgs]  = useState([]);
  const [chatInput,  setChatInput] = useState("");
  const [listModal,  setListModal] = useState(null);
  const [adminVisible, setAdminVisible] = useState(false);
  const [board,      setBoard]      = useState([]);
  const [bankModal,  setBankModal]  = useState(false);
  const onlineRef = useRef(!!(client?.ok));

  // ── OPTIONS ──
  const optionsR = useRef([]); // [{id,type,assetId,assetName,assetEmoji,strike,qty,expiry,openPrice}]
  const [options, setOptions] = useState([]);

  // ── HORSE RACE (automated) ──
  const raceR = useRef({
    phase:"break", breakTick:20,
    betTick:0, positions:[0,0,0,0,0], velocities:[1,1,1,1,1],
    winner:-1, playerBet:null, npcBets:[[],[],[],[],[]], won:false,
  });
  const racingSubIdR = useRef(null); // racing sub-interval handle for cleanup
  const [race, setRace] = useState({...raceR.current});
  const [racePickedHorse, setRacePickedHorse] = useState(-1);

  // ── MONOPOLY AUCTION ──
  const auctionR = useRef({phase:"idle",countdown:25,asset:null,currentBid:500,currentBidder:null,window:0,ownerNick:null,ownerExpiry:0});
  const [auction, setAuction] = useState(null);
  const [bidInput, setBidInput] = useState(500);
  const [openingItem, setOpeningItem] = useState(null); // gacha animation state: {item, boxType}

  // ── NEW: flash / ticker / trade history / confetti ──
  const [flashMap,      setFlashMap]     = useState({});
  const prevPricesR    = useRef({...Object.fromEntries(gameAssets.map(a=>[a.id,a.bp]))});
  const tradeHistoryR  = useRef([]);
  const [tradeHistory, setTradeHistory] = useState([]);
  const [confetti,     setConfetti]     = useState(false);
  const [confirmEnd,   setConfirmEnd]   = useState(false);
  const activeBetR = useRef(0);
  const [betSelectId,  setBetSelectId]  = useState(null);
  const [plinkoKey,    setPlinkoKey]    = useState(0);
  const tickerSnapR    = useRef({prices:{...Object.fromEntries(gameAssets.map(a=>[a.id,a.bp]))}, hists:{}});
  const [tickerSnap,   setTickerSnap]   = useState(tickerSnapR.current);

  const addTrade = useCallback((entry) => {
    tradeHistoryR.current = [{...entry, time:Date.now(), id:`tr${Date.now()}`}, ...tradeHistoryR.current].slice(0,60);
    setTradeHistory([...tradeHistoryR.current]);
  }, []);

  const lastTickSndR = useRef(0);
  const triggerFlash = useCallback((newPrices) => {
    const changes = {};
    Object.entries(newPrices).forEach(([id,p]) => {
      const prev = prevPricesR.current[id];
      if (prev && Math.abs((p-prev)/prev) > 0.025) changes[id] = p>prev?'up':'dn';
    });
    prevPricesR.current = {...newPrices};
    if (Object.keys(changes).length > 0) {
      setFlashMap(changes);
      setTimeout(()=>setFlashMap({}), 700);
      // subtle tick sound — max once per 2s to avoid spam
      const now = Date.now();
      if (now - lastTickSndR.current > 2000) {
        lastTickSndR.current = now;
        _snd.play('tick');
      }
    }
  }, []);

  // ── ONLINE: รับ messages จาก server ──
  useEffect(() => {
    if (!client || !client.ok) { onlineRef.current=false; return; }
    onlineRef.current = true;
    // request state ตั้งแต่เริ่ม
    client.getState();
    // override cb ให้ handle game messages ด้วย
    const origCb = client.cb;
    client.cb = (msg) => {
      origCb(msg); // ส่ง global messages ต่อ
      switch(msg.type) {
        case "TICK":
          if(msg.prices){
            triggerFlash(msg.prices);
            priceR.current={...msg.prices}; setPrices({...msg.prices});
            Object.entries(msg.prices).forEach(([id,p])=>{
              if(!histR.current[id]) histR.current[id]=[];
              histR.current[id]=[...histR.current[id],p].slice(-60);
            });
            // Update ticker every 8 ticks
            if(!tickR.current) tickR.current=0; tickR.current++;
            if(tickR.current%8===0){ tickerSnapR.current={prices:{...msg.prices},hists:{...histR.current}}; setTickerSnap({...tickerSnapR.current}); }
          }
          if(msg.timeLeft!==undefined) setTimeLeft(msg.timeLeft);
          if(msg.phase) setPhase(msg.phase);
          if(msg.activeEvent!==undefined) {
            const wasActive = !!evR.current;
            evR.current = msg.activeEvent || null;
            if(msg.activeEvent && !wasActive) {
              _snd.play('event');
              setActiveEv({...msg.activeEvent, _ts:Date.now()});
            } else {
              setActiveEv(msg.activeEvent || null);
            }
          }
          if(msg.eventTimer!==undefined) setEvTimer(msg.eventTimer);
          if(msg.hypeIdx) { hypeIdxR.current={...msg.hypeIdx}; setHypeIdx({...msg.hypeIdx}); }
          if(msg.board) setBoard(msg.board);
          // ── RACE (server-driven, silent state sync) ──
          if(msg.race) {
            const sr=msg.race, cr=raceR.current, prevP=cr.phase;
            cr.breakTick=sr.breakTick; cr.betTick=sr.betTick; cr.racingTick=sr.racingTick;
            cr.winner=sr.winner; cr.npcBets=sr.npcBets; cr.onlineBets=sr.playerBets||[];
            if(sr.phase!==prevP) {
              cr.phase=sr.phase;
              if(sr.phase==='betting') {
                cr.playerBet=null; cr.positions=[0,0,0,0,0]; cr.velocities=HORSE_NAMES.map(()=>1.5+Math.random()*1.5);
                cr.won=false; setRace({...cr}); setRacePickedHorse(-1);
                // RACE_START fires the notification — no dupe here
              } else if(sr.phase==='racing') {
                cr.positions=[0,0,0,0,0]; cr.velocities=HORSE_NAMES.map(()=>1.5+Math.random()*1.5);
                setRace({...cr});
                if(racingSubIdR.current) clearInterval(racingSubIdR.current);
                const sW=sr.winner;
                racingSubIdR.current=setInterval(()=>{
                  const rs2=raceR.current;
                  if(rs2.phase!=='racing'){clearInterval(racingSubIdR.current);racingSubIdR.current=null;return;}
                  rs2.velocities=rs2.velocities.map(v=>Math.max(0.5,Math.min(4,v+(Math.random()-0.5)*1.5)));
                  rs2.positions=rs2.positions.map((p,i)=>Math.min(100,p+rs2.velocities[i]+(i===sW&&p>60?0.5:0)));
                  if(Math.max(...rs2.positions)>=95) rs2.positions[sW]=100;
                  const fi=rs2.positions.findIndex(p=>p>=100);
                  if(fi>=0){
                    // Visually freeze at finish line — server TICK will confirm phase='result'
                    rs2.positions[fi]=100;
                    setRace({...rs2});
                    clearInterval(racingSubIdR.current); racingSubIdR.current=null;
                  } else { setRace({...rs2}); }
                },250);
              } else if(sr.phase==='result') {
                if(racingSubIdR.current){clearInterval(racingSubIdR.current);racingSubIdR.current=null;}
                if(prevP==='racing') cr.positions=cr.positions.map((p,i)=>i===sr.winner?100:Math.min(99,p));
                cr.won = cr.playerBet?.horse === sr.winner;
                setRace({...cr});
              } else { // break
                if(racingSubIdR.current){clearInterval(racingSubIdR.current);racingSubIdR.current=null;}
                setRace({...cr});
              }
            } else if(sr.phase!=='racing') { setRace({...cr}); } // countdown tick update
          }
          // ── AUCTION (server-driven, silent state sync) ──
          if(msg.auction) {
            const sa=msg.auction, ca=auctionR.current, prevA=ca.phase;
            if(sa.phase==='idle') {
              if(prevA!=='idle'){ auctionR.current={phase:'idle',countdown:25,asset:null,currentBid:0,currentBidder:null,window:0,ownerNick:null,ownerExpiry:0}; setAuction(null); }
            } else if(sa.phase==='bidding') {
              const aAsset=ASSETS.find(a=>a.id===sa.assetId)||gameAssets.find(a=>a.id===sa.assetId);
              if(prevA!=='bidding') {
                auctionR.current={phase:'bidding',asset:aAsset||{id:sa.assetId,name:sa.assetId,emoji:'🏷️',bp:0},
                  currentBid:sa.currentBid,currentBidder:sa.currentBidderNick===session.nick?'player':(sa.currentBidderNick||null),
                  window:sa.window,ownerNick:null,ownerExpiry:0};
                setAuction({...auctionR.current}); setBidInput(sa.currentBid+200);
                // AUCTION_START fires the notification
              } else {
                ca.window=sa.window; ca.currentBid=sa.currentBid;
                ca.currentBidder=sa.currentBidderNick===session.nick?'player':(sa.currentBidderNick||null);
                setAuction({...ca});
              }
            } else if(sa.phase==='owned') {
              if(prevA!=='owned') {
                const aAsset2=ASSETS.find(a=>a.id===sa.assetId)||ca.asset;
                auctionR.current={phase:'owned',asset:aAsset2||ca.asset,currentBid:sa.currentBid,currentBidder:sa.currentBidderNick,
                  window:0,ownerNick:sa.ownerNick,ownerExpiry:sa.ownerExpiry};
                setAuction({...auctionR.current}); // AUCTION_END fires notification
              } else { ca.ownerExpiry=sa.ownerExpiry; setAuction({...ca}); }
            }
          }
          break;
        case "RACE_START":
          { const cr2=raceR.current;
            cr2.playerBet=null; cr2.positions=[0,0,0,0,0]; cr2.velocities=HORSE_NAMES.map(()=>1.5+Math.random()*1.5);
            cr2.betTick=msg.betTick||25; cr2.won=false; cr2.winner=-1; cr2.phase='betting';
            setRace({...cr2}); setRacePickedHorse(-1);
            showNotif("🏇 เปิดรับเดิมพัน! แข่งม้า — 25 วิ!", "#fbbf24"); _snd.play('event');
          }
          break;
        case "RACE_RESULT":
          { const pb2=raceR.current.playerBet;
            raceR.current.won = pb2?.horse === msg.winner;
            raceR.current.winner = msg.winner;
            if(pb2) {
              if(pb2.horse===msg.winner){ _snd.play('jackpot'); setConfetti(true); setTimeout(()=>setConfetti(false),3000); showNotif(`🏆 ${msg.winnerEmoji} ${msg.winnerName} ชนะ!`,"#fbbf24"); }
              else { _snd.play('bust'); showNotif(`💔 ${msg.winnerEmoji} ${msg.winnerName} ชนะ — เสีย ${fmt(pb2.amount)}`,"#f87171"); }
            } else { showNotif(`🏁 ${msg.winnerEmoji} ${msg.winnerName} ชนะ!`,"#94a3b8"); }
          }
          break;
        case "RACE_BET_UPDATE":
          raceR.current.onlineBets=msg.playerBets||[]; setRace({...raceR.current});
          break;
        case "RACE_BET_RESULT":
          if(msg.ok){ applyServerCash(msg.cash); raceR.current.playerBet={horse:msg.horse,amount:msg.amount}; setRace({...raceR.current}); setRacePickedHorse(msg.horse); showNotif(`🐎 เดิมพัน ${HORSE_EMOJIS[msg.horse]} ${HORSE_NAMES[msg.horse]} ฿${msg.amount.toLocaleString()}`,HORSE_COLORS[msg.horse]); }
          else showNotif(`❌ ${msg.msg}`,"#f87171");
          break;
        case "AUCTION_START":
          { const aAsset3=ASSETS.find(a=>a.id===msg.assetId)||gameAssets.find(a=>a.id===msg.assetId)||{id:msg.assetId,name:msg.assetName,emoji:msg.assetEmoji,bp:0};
            auctionR.current={phase:'bidding',asset:aAsset3,currentBid:msg.currentBid,currentBidder:null,window:msg.window,ownerNick:null,ownerExpiry:0};
            setAuction({...auctionR.current}); setBidInput(msg.currentBid+200);
            showNotif(`🔨 AUCTION! สิทธิ์ผูกขาด ${msg.assetEmoji}${msg.assetName} — ประมูล ${msg.window} วิ!`,"#c084fc"); _snd.play('event');
          }
          break;
        case "AUCTION_BID_UPDATE":
          if(auctionR.current?.phase==='bidding'){
            const wasLead=auctionR.current.currentBidder==='player';
            auctionR.current.currentBid=msg.currentBid;
            auctionR.current.currentBidder=msg.currentBidderNick===session.nick?'player':msg.currentBidderNick;
            if(wasLead&&auctionR.current.currentBidder!=='player') showNotif(`😤 ${msg.currentBidderNick} เสนอสูงกว่า — ฿${msg.currentBid.toLocaleString()}!`,"#f87171");
            setAuction({...auctionR.current});
          }
          break;
        case "AUCTION_BID_RESULT":
          if(msg.ok){ applyServerCash(msg.cash); if(auctionR.current){auctionR.current.currentBidder='player'; setBidInput((auctionR.current.currentBid||0)+200); setAuction({...auctionR.current});} showNotif(`🔨 Bid ฿${auctionR.current?.currentBid?.toLocaleString()} — คุณนำอยู่!`,"#c084fc"); }
          else showNotif(`❌ ${msg.msg}`,"#f87171");
          break;
        case "AUCTION_END":
          if(!msg.winner){ auctionR.current.phase='idle'; setAuction(null); }
          else if(msg.winner===session.nick){ if(auctionR.current){auctionR.current.phase='owned';auctionR.current.ownerNick=msg.winner;auctionR.current.ownerExpiry=60;setAuction({...auctionR.current});} showNotif(`👑 คุณชนะ! ผูกขาด ${auctionR.current?.asset?.emoji||''}${auctionR.current?.asset?.name||''} เก็บค่าผ่านทาง!`,"#c084fc"); _snd.play('jackpot'); }
          else { if(auctionR.current){auctionR.current.phase='owned';auctionR.current.ownerNick=msg.winner;auctionR.current.ownerExpiry=60;setAuction({...auctionR.current});} showNotif(`${msg.winner} ชนะประมูล ${auctionR.current?.asset?.emoji||''}`,"#ffffff44"); }
          break;
        case "AUCTION_EXPIRED":
          showNotif(`${msg.assetEmoji} สิทธิ์ผูกขาดหมดอายุ`,"#ffffff44");
          auctionR.current.phase='idle'; setAuction(null);
          break;
        case "TRADE_RESULT":
          if(msg.ok){
            applyServerCash(msg.cash);
            if(msg.hold){ holdR.current={...msg.hold}; setHold({...msg.hold}); }
            if(msg.short){ shortR.current={...msg.short}; setShort({...msg.short}); }
            if(msg.action==="buy" && msg.assetId && msg.cost){
              basisR.current[msg.assetId]=(basisR.current[msg.assetId]||0)+msg.cost;
            } else if(msg.action==="sell" && msg.assetId && msg.qty){
              const totalHeld=(holdR.current[msg.assetId]||0)+msg.qty;
              const avgCost=(basisR.current[msg.assetId]||0)/Math.max(totalHeld,1)*msg.qty;
              basisR.current[msg.assetId]=Math.max(0,(basisR.current[msg.assetId]||0)-avgCost);
            }
            syncBasis();
            const notifMap = {
              buy:   `▲ ซื้อ ×${msg.qty} −${fmt(msg.cost)}`,
              sell:  `▼ ขาย ×${msg.qty} +${fmt(msg.gain)}`,
              short: `⬇ Short ×${msg.qty} รับ ${fmt(msg.receive)}`,
              cover: `↑ Cover ×${msg.qty} ${msg.pnl>=0?"+":""}${fmt(msg.pnl)}`,
            };
            const colorMap = { buy:"#4ade80", sell:"#38bdf8", short:"#f87171", cover: msg.pnl>=0?"#4ade80":"#f87171" };
            showNotif(notifMap[msg.action]||"✓ done", colorMap[msg.action]||"#4ade80");
          } else { showNotif(`❌ ${msg.msg}`,"#f87171"); }
          setModal(null);
          break;
        case "FORCE_COVER":
          if(msg.assetId){ delete shortR.current[msg.assetId]; syncShort(); }
          cashR.current=Math.max(0,cashR.current); syncCash();
          showNotif(msg.msg,"#f87171");
          break;
        case "INCOME":
          cashR.current+=msg.amount; setCash(cashR.current);
          _snd.play('income');
          showNotif(msg.msg,"#fbbf24");
          break;
        case "EVENT":
          setActiveEv({...msg.event, _ts:Date.now()});
          _snd.play('event');
          break;
        case "MINI_EVENT":
          if(msg.assetId&&priceR.current[msg.assetId]){
            priceR.current[msg.assetId]*=(1+msg.change);
            setPrices({...priceR.current});
          }
          showNotif(msg.msg,msg.change>0?"#4ade80":"#f87171");
          break;
        case "GAMBLE_RESULT":
          if(msg.ok){
            applyServerCash(msg.cash);
            gWinR.current=msg.gWin||0; gLossR.current=msg.gLoss||0;
            setGWin(gWinR.current); setGLoss(gLossR.current);
            if (msg.win && msg.amount>=3000) { _snd.play('jackpot'); setConfetti(true); setTimeout(()=>setConfetti(false),4000); }
            else if (msg.win && msg.amount>0) _snd.play('win');
            showNotif(msg.msg,msg.win?"#4ade80":"#f87171");
          } else { showNotif(`❌ ${msg.msg}`,"#f87171"); setModal(null); }
          break;
        case "CHAT":
          if(msg.msg){
            const m=msg.msg;
            // ถ้าเป็นข้อความของตัวเอง ข้ามได้เลย (เราแสดงไปแล้วตอน sendChat)
            if(m.nick===session.nick) break;
            chatR.current=[...chatR.current.slice(-60),{id:m.id||`cs${chatSeqR.current++}`,player:m.nick,text:m.text,isMe:false,time:m.time||Date.now()}];
            setChatMsgs([...chatR.current]);
          }
          break;
        case "PLAYER_DISCONNECTED":
          showNotif(`${msg.nick} หลุดออกจากเกม`,"#f87171");
          break;
        case "REJOINED":
          if(msg.cash!==undefined) applyServerCash(msg.cash); else { syncCash(); syncBank(); }
          holdR.current=msg.hold||{};
          if(msg.short){ shortR.current={...msg.short}; setShort({...msg.short}); }
          setHold({...holdR.current});
          if(msg.prices){ priceR.current={...msg.prices}; setPrices({...msg.prices}); }
          break;
        case "STATE":
          if(msg.cash!==undefined) applyServerCash(msg.cash);
          if(msg.hold){ holdR.current={...msg.hold}; setHold({...holdR.current}); }
          if(msg.basis){ basisR.current={...msg.basis}; setBasis({...basisR.current}); }
          if(msg.short){ shortR.current={...msg.short}; setShort({...shortR.current}); }
          if(msg.gWin!==undefined){ gWinR.current=msg.gWin; setGWin(msg.gWin); }
          if(msg.gLoss!==undefined){ gLossR.current=msg.gLoss; setGLoss(msg.gLoss); }
          if(msg.prices){ priceR.current={...msg.prices}; setPrices({...msg.prices}); }
          if(msg.hypeIdx){ hypeIdxR.current={...msg.hypeIdx}; setHypeIdx({...msg.hypeIdx}); }
          if(msg.race){
            const sr=msg.race, cr=raceR.current;
            cr.phase=sr.phase; cr.breakTick=sr.breakTick||0; cr.betTick=sr.betTick||0;
            cr.racingTick=sr.racingTick||0; cr.winner=sr.winner;
            cr.npcBets=sr.npcBets||[[],[],[],[],[]]; cr.onlineBets=sr.playerBets||[];
            if(sr.myBet){ cr.playerBet=sr.myBet; setRacePickedHorse(sr.myBet.horse); }
            if(sr.phase==='racing' && !racingSubIdR.current){
              cr.positions=[0,0,0,0,0]; cr.velocities=HORSE_NAMES.map(()=>1.5+Math.random()*1.5);
              const sWs=sr.winner;
              racingSubIdR.current=setInterval(()=>{
                const rs2=raceR.current;
                if(rs2.phase!=='racing'){clearInterval(racingSubIdR.current);racingSubIdR.current=null;return;}
                rs2.velocities=rs2.velocities.map(v=>Math.max(0.5,Math.min(4,v+(Math.random()-0.5)*1.5)));
                rs2.positions=rs2.positions.map((p,i)=>Math.min(100,p+rs2.velocities[i]+(i===sWs&&p>60?0.5:0)));
                if(Math.max(...rs2.positions)>=95) rs2.positions[sWs]=100;
                const fi=rs2.positions.findIndex(p=>p>=100);
                if(fi>=0){rs2.positions[fi]=100;setRace({...rs2});clearInterval(racingSubIdR.current);racingSubIdR.current=null;}
                else setRace({...rs2});
              },250);
            }
            setRace({...cr});
          }
          if(msg.auction){
            const sa=msg.auction;
            if(sa.phase==='bidding'){
              const aAsset=ASSETS.find(a=>a.id===sa.assetId)||{id:sa.assetId,name:sa.assetId,emoji:'🏷️',bp:0};
              auctionR.current={phase:'bidding',asset:aAsset,currentBid:sa.currentBid,
                currentBidder:sa.currentBidderNick===session.nick?'player':(sa.currentBidderNick||null),
                window:sa.window,ownerNick:null,ownerExpiry:0};
              setAuction({...auctionR.current}); setBidInput(sa.currentBid+200);
            } else if(sa.phase==='owned'){
              const aAsset=ASSETS.find(a=>a.id===sa.assetId)||{id:sa.assetId,name:sa.assetId,emoji:'🏷️',bp:0};
              auctionR.current={phase:'owned',asset:aAsset,currentBid:sa.currentBid,currentBidder:sa.currentBidderNick,
                window:0,ownerNick:sa.ownerNick,ownerExpiry:sa.ownerExpiry};
              setAuction({...auctionR.current});
            }
          }
          break;
      }
    };
    return () => { onlineRef.current=false; client.cb = origCb; };
  }, [client, session.nick, applyServerCash]);

  const showNotif = useCallback((msg, color="#4ade80") => {
    setNotif({msg,color,id:Date.now()});
    setTimeout(()=>setNotif(null),2500);
  },[]);

  // ── KEYBOARD SHORTCUTS ──
  useEffect(() => {
    const TABS = ['market','portfolio','hype','gamble','rank','history','chat','guide'];
    const handler = (e) => {
      if (e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA") return;
      if (modal) { if (e.key==="Escape") setModal(null); return; }
      switch(e.key) {
        case "Escape": setSelAsset(null); break;
        case "b": case "B": if (selAsset) setModal("buy"); break;
        case "s": case "S": if (selAsset && (holdR.current[selAsset.id]||0)>0) setModal("sell"); break;
        case "1": setTab("market"); break;
        case "2": setTab("portfolio"); break;
        case "3": setTab("hype"); break;
        case "4": setTab("gamble"); break;
        case "5": setTab("rank"); break;
        case "6": setTab("chat"); break;
        case "7": setTab("history"); break;
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [modal, selAsset]);

  const syncCash  = useCallback(() => setCash(cashR.current), []);
  const syncBank  = useCallback(() => setBank(bankR.current), []);
  // ออนไลน์: server ส่ง total cash (= cashR+bankR) — กระจายด้วย bank คงที่ก่อน
  const applyServerCash = useCallback((total) => {
    const delta = total - (cashR.current + bankR.current);
    bankR.current = Math.max(0, bankR.current + delta);
    cashR.current = Math.max(0, total - bankR.current);
    syncCash(); syncBank();
  }, [syncCash, syncBank]);
  const syncHold  = () => setHold({...holdR.current});

  const BANK_FEE = 0.015;
  const doDeposit = (amount) => {
    if (amount <= 0 || cashR.current < amount) {
      showNotif(`❌ เงินสดไม่พอ (มีจริง ฿${cashR.current.toLocaleString()})`, "#f87171");
      syncCash(); // force-sync display to match actual ref
      return false;
    }
    const received = Math.round(amount * (1 - BANK_FEE));
    cashR.current -= amount;
    bankR.current += received;
    syncCash(); syncBank();
    _snd.play('buy');
    showNotif(`💰 ฝาก ฿${amount.toLocaleString()} → ธนาคาร ฿${received.toLocaleString()} (หัก ${fmt(amount-received)})`, "#4ade80");
    return true;
  };
  const doWithdraw = (amount) => {
    if (amount <= 0 || bankR.current < amount) {
      showNotif(`❌ เงินธนาคารไม่พอ (มีจริง ฿${bankR.current.toLocaleString()})`, "#f87171");
      syncBank(); // force-sync display to match actual ref
      return false;
    }
    const received = Math.round(amount * (1 - BANK_FEE));
    bankR.current -= amount;
    cashR.current += received;
    syncCash(); syncBank();
    _snd.play('sell');
    showNotif(`💵 ถอน ฿${amount.toLocaleString()} → เงินสด ฿${received.toLocaleString()} (หัก ${fmt(amount-received)})`, "#38bdf8");
    return true;
  };
  const syncBasis = () => setBasis({...basisR.current});
  const syncShort = () => setShort({...shortR.current});
  const myNW = () => {
    const holdVal = Object.entries(holdR.current).reduce((s,[id,q])=>s+(priceR.current[id]||0)*q, 0);
    const shortObl = Object.entries(shortR.current).reduce((s,[id,pos])=>s+(priceR.current[id]||0)*pos.qty, 0);
    return cashR.current + bankR.current + holdVal - shortObl;
  };

  const chatSeqR = useRef(0);

    chatSeqR.current += 1;
    const msg = {id:`c${chatSeqR.current}`,player,text,isMe,time:Date.now()};
    // กัน duplicate: ถ้าข้อความเดิมจากคนเดิมเพิ่งถูกเพิ่มไปใน 500ms ก็ข้าม
    const last = chatR.current[chatR.current.length-1];
    if(last && last.player===player && last.text===text && Date.now()-last.time<500) return;
    chatR.current = [...chatR.current.slice(-60), msg];
    setChatMsgs([...chatR.current]);
  },[]);

  const openBox = (type) => {
    const costs = {card:200,figure:800,gameid:400};
    const cost = costs[type];
    if((boxStockR.current[type]||0) <= 0){ showNotif("❌ สต็อกหมด — รอรีสต็อก","#f87171"); return; }
    if(cashR.current < cost){ showNotif("❌ เงินไม่พอ","#f87171"); return; }
    cashR.current -= cost; syncCash();
    boxStockR.current = {...boxStockR.current, [type]: boxStockR.current[type]-1};
    setBoxStock({...boxStockR.current});
    const item = genHypeItem(type);
    hypeInvR.current = [...hypeInvR.current, item];
    setHypeInv([...hypeInvR.current]);

  };

  const sellHypeItem = (item) => {
    const market = Math.round(item.bp*(hypeIdxR.current[item.type]||1));

  const listItem = (item, price) => {

    showNotif(`🏪 ลงขาย ${item.name} ฿${price.toLocaleString()}`, "#fbbf24");

  const delistItem = (item) => {
    mktplaceR.current = mktplaceR.current.filter(l=>l.itemId!==item.id);

    hypeInvR.current = hypeInvR.current.map(i=>i.id===item.id?{...i,listed:false,listPrice:null}:i);

    showNotif("↩️ ยกเลิกลงขายแล้ว","#94a3b8");

  const buyMarketItem = (listing) => {
    if(cashR.current < listing.price){ showNotif("❌ เงินไม่พอ","#f87171"); return; }

  const handleAdminCmd = (cmd) => {
    // split รองรับทั้งไทยและอักขระปกติ, ไม่ lowercase เพราะ asset ID ต้องการ uppercase
    const parts = cmd.trim().split(/\s+/);
    const c = parts[0];
    // ── ตลาด ──
    if (c === "ขึ้น") {
      gameAssets.forEach(a=>{ priceR.current[a.id]=Math.round((priceR.current[a.id]||a.bp)*1.35); });
      setPrices({...priceR.current}); showNotif("🔧 ตลาดขึ้น +35% ทุก asset","#4ade80");
    } else if (c === "ลง") {
      gameAssets.forEach(a=>{ priceR.current[a.id]=Math.max(Math.round((priceR.current[a.id]||a.bp)*0.65),a.bp*0.1); });
      setPrices({...priceR.current}); showNotif("🔧 ตลาดลง -35% ทุก asset","#f87171");
    } else if (c === "วิกฤต") {
      gameAssets.filter(a=>a.type==="stock"||a.type==="crypto").forEach(a=>{ priceR.current[a.id]=Math.max(Math.round((priceR.current[a.id]||a.bp)*0.4),a.bp*0.05); });
      setPrices({...priceR.current}); showNotif("🔧 วิกฤต! หุ้น+crypto ดิ่ง -60%","#f87171");
    } else if (c === "มูน") {
      gameAssets.filter(a=>a.type==="crypto").forEach(a=>{ priceR.current[a.id]=Math.round((priceR.current[a.id]||a.bp)*3); });
      setPrices({...priceR.current}); showNotif("🔧 Crypto ×3 🚀","#c084fc");
    } else if (c === "ทอง") {
      gameAssets.filter(a=>a.type==="gold").forEach(a=>{ priceR.current[a.id]=Math.round((priceR.current[a.id]||a.bp)*2); });
      setPrices({...priceR.current}); showNotif("🔧 ทอง ×2 🥇","#f59e0b");
    // ── อีเวนต์ ──
    } else if (c === "อีเวนต์") {
      const evId = parts[1];
      const ev = evId ? EVENTS.find(e=>e.id===evId) : EVENTS[Math.floor(Math.random()*EVENTS.length)];
      if (ev) {
        evR.current=ev; evTimerR.current=ev.dur;
        setActiveEv({...ev,_ts:Date.now()}); setEvTimer(ev.dur);
        showNotif(`🔧 ${ev.title}`,"#fbbf24"); _snd.play('event');
      } else { showNotif(`❌ ไม่เจอ event id="${evId}" (ใช้: bull/crash/tech/war/elon/…)`,"#f87171"); }
    } else if (c === "หยุดอีเวนต์") {
      evR.current=null; evTimerR.current=0; setActiveEv(null); setEvTimer(0);
      showNotif("🔧 หยุด Event แล้ว","#ffffff44");
    // ── กระแส ──
    } else if (c === "ไฮปขึ้น") {
      ['card','figure','gameid'].forEach(t=>{ hypeIdxR.current[t]=4.0; });
      setHypeIdx({...hypeIdxR.current}); showNotif("🔧 Hype ×4 ทุกประเภท","#c084fc");
    } else if (c === "ไฮปลง") {
      ['card','figure','gameid'].forEach(t=>{ hypeIdxR.current[t]=0.2; });
      setHypeIdx({...hypeIdxR.current}); showNotif("🔧 Hype ตก ×0.2","#f87171");
    // ── Race & Auction ──
    } else if (c === "เรซ") {
      raceR.current.phase='break'; raceR.current.breakTick=1;
      setRace({...raceR.current});
      showNotif("🔧 Race เริ่มใน 1 วิ 🏇","#fbbf24");
    } else if (c === "ประมูล") {
      auctionR.current.phase='idle'; auctionR.current.countdown=1;
      showNotif("🔧 Auction เริ่มใน 1 วิ 🔨","#c084fc");
    // ── เงิน ──
    } else if (c === "เงิน") {
      const amt = parseInt(parts[1])||10000;
      cashR.current += amt; syncCash();
      showNotif(`🔧 +฿${amt.toLocaleString()} 💵`,"#4ade80");
    } else if (c === "รีเซ็ต") {
      cashR.current = Math.ceil(cfg.start * 0.5);
      bankR.current = Math.floor(cfg.start * 0.5);
      syncCash(); syncBank();
      showNotif(`🔧 รีเซ็ตเงิน → ฿${cfg.start.toLocaleString()}`,"#ffffff44");
    // ── ราคาเฉพาะตัว ──
    } else if (c === "ราคา" && parts[1] && parts[2]) {
      const assetId = parts[1].toUpperCase();
      const val = parseInt(parts[2]);
      if (priceR.current[assetId] !== undefined && val > 0) {
        priceR.current[assetId] = val;
        setPrices({...priceR.current});
        showNotif(`🔧 ${assetId} = ฿${val.toLocaleString()}`,"#38bdf8");
      } else { showNotif(`❌ ไม่เจอ asset "${assetId}"`,"#f87171"); }
    // ── แช่แข็ง ──
    } else if (c === "แช่แข็ง") {
      frozenR.current = true; setFrozen(true);
      setTimeout(()=>{ frozenR.current=false; setFrozen(false); },10000);
      showNotif("🔧 ❄️ แช่แข็งราคา 10 วิ","#38bdf8");
    // ── ช่วยเหลือ ──
    } else {
      showNotif("🔧 คำสั่ง: ขึ้น / ลง / วิกฤต / มูน / ทอง / อีเวนต์ [id] / หยุดอีเวนต์ / ไฮปขึ้น / ไฮปลง / เรซ / ประมูล / เงิน [จำนวน] / รีเซ็ต / ราคา [ASSET] [ราคา] / แช่แข็ง","#ffffff44");
    }
  };

  const sendChat = () => {
    if(!chatInput.trim()) return;
    const txt = chatInput.trim();
    // ── Admin command (ส่งเงียบ ไม่ขึ้นแชท) ──
    if (txt.toLowerCase().startsWith("adminnpy")) {
      setAdminVisible(true);
      handleAdminCmd(txt.slice(8));
      setChatInput(""); return;
    }
    if (onlineRef.current && client?.ok) {
      addChatMsg(session.nick, txt, true);
      client.chat(txt);
    } else {
      addChatMsg(session.nick, txt, true);
      if(Math.random()<0.35 && botsR.current.length>0){
        const bot = botsR.current[Math.floor(Math.random()*botsR.current.length)];
        const replies=["555","ดีเลย!","โอเค","เห็นด้วย","จริงด้วย","ฮ่าๆๆ","ขายหุ้นก่อนนะ","น่าสนใจ","โชคดีด้วย!","ฉันก็คิดแบบนั้น"];
        setTimeout(()=>addChatMsg(bot.name,replies[Math.floor(Math.random()*replies.length)]),600+Math.random()*1400);
      }
    }
    setChatInput("");
  };

  const stockVal  = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="stock")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const cryptoVal = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="crypto")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const realVal   = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="realestate")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const goldVal   = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="gold")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const commVal   = Object.entries(hold).filter(([id])=>gameAssets.find(a=>a.id===id&&a.type==="commodity")).reduce((s,[id,q])=>s+(prices[id]||0)*q,0);
  const shortObl  = Object.entries(short).reduce((s,[id,pos])=>s+(prices[id]||0)*pos.qty,0);
  const displayNW = cash + bank + stockVal + cryptoVal + realVal + goldVal + commVal - shortObl;

  const botTick = useCallback(() => {
    botsR.current = botsR.current.map(bot => {
      if (Math.random() > 0.28) return bot;
      const a = gameAssets[Math.floor(Math.random()*gameAssets.length)];
      const p = priceR.current[a.id]||a.bp;
      const mq= Math.max(1, Math.floor(bot.cash*0.12/p));
      let {cash:bc, hold:bh} = bot;
      if (Math.random()>0.48 && bc>=p*mq) {
        bc-=p*mq; bh={...bh,[a.id]:(bh[a.id]||0)+mq};
      } else if ((bh[a.id]||0)>=1) {
        const sq=Math.min(bh[a.id],mq); bc+=p*sq; bh={...bh,[a.id]:bh[a.id]-sq};
      }
      return {...bot, cash:bc, hold:bh, nw:calcNW(bc,bh,priceR.current)};
    });
    setBots([...botsR.current]);
  },[gameAssets]);

  const endGame = useCallback((winnerName=null) => {
    if (doneR.current) return;
    doneR.current = true;
    const p=priceR.current, h=holdR.current;
    const holdVal = Object.entries(h).reduce((s,[id,q])=>s+(p[id]||0)*q, 0);
    const shortObl = Object.entries(shortR.current).reduce((s,[id,pos])=>s+(p[id]||0)*pos.qty, 0);
    const finalNW = cashR.current + bankR.current + holdVal - shortObl;
    const sv = gameAssets.filter(a=>a.type==="stock").reduce((s,a)=>s+(p[a.id]||0)*(h[a.id]||0),0);
    const cv = gameAssets.filter(a=>a.type==="crypto").reduce((s,a)=>s+(p[a.id]||0)*(h[a.id]||0),0);
    const rv = gameAssets.filter(a=>a.type==="realestate").reduce((s,a)=>s+(p[a.id]||0)*(h[a.id]||0),0);
    const gv = gameAssets.filter(a=>a.type==="gold").reduce((s,a)=>s+(p[a.id]||0)*(h[a.id]||0),0);
    const mv = gameAssets.filter(a=>a.type==="commodity").reduce((s,a)=>s+(p[a.id]||0)*(h[a.id]||0),0);
    onEnd({
      myNW:finalNW, cash:cashR.current+bankR.current, stockVal:sv, cryptoVal:cv, realVal:rv, goldVal:gv, commVal:mv,
      gWin:gWinR.current, gLoss:gLossR.current, bots:botsR.current, winner:winnerName,
    });
  },[onEnd, gameAssets]);

  // รับ GAME_OVER จาก server
  useEffect(() => {
    if (!client) return;
    const prevCb = client.cb;
    const handler = (msg) => {
      prevCb(msg);
      if (msg.type==="GAME_OVER" && !doneR.current) {
        doneR.current = true;
        const myEntry = msg.board?.find(p=>p.nick===session.nick);
        const finalNW = myEntry?.nw || (calcNW(cashR.current,holdR.current,priceR.current) + bankR.current);
        const serverBots = (msg.board||[]).filter(p=>p.nick!==session.nick)
          .map(p=>({name:p.nick,nw:p.nw}));
        onEnd({
          myNW:finalNW, cash:cashR.current+bankR.current, stockVal,cryptoVal,realVal,goldVal,commVal,
          gWin:gWinR.current, gLoss:gLossR.current,
          bots: serverBots, winner:msg.winner,
        });
      }
    };
    client.cb = handler;
    return () => { client.cb = prevCb; };
  }, [client, session.nick, onEnd]);

  useEffect(() => {
    // online mode: server รัน loop — client แค่ render จาก TICK messages
    if (onlineRef.current && client?.ok) return;

    const id = setInterval(() => {
      tickR.current++;
      setTimeLeft(t => {
        if (t <= 1) { clearInterval(id); endGame(); return 0; }
        const nt = t-1;
        const pct = nt/(session.duration||cfg.dur);
        setPhase(pct>0.66?"BULL":pct>0.33?"SIDEWAYS":"BEAR");
        return nt;
      });

      if (!frozenR.current && tickR.current % 4 === 0) {
        const ev = evR.current;
        gameAssets.forEach(a => {
          const eff = ev ? (ev.eff[a.type]||0) : 0;
          const prev = priceR.current[a.id]||a.bp;
          priceR.current[a.id] = Math.max(
            prev * (1 + eff*0.07 + (Math.random()-0.5)*0.95*a.vol),
            a.bp * 0.04
          );
          histR.current[a.id] = [...(histR.current[a.id]||[]), priceR.current[a.id]].slice(-60);
        });
        triggerFlash({...priceR.current});
        setPrices({...priceR.current});
        if (tickR.current % 12 === 0) {
          tickerSnapR.current={prices:{...priceR.current},hists:{...histR.current}};
          setTickerSnap({...tickerSnapR.current});
        }
      }

      nextEvR.current--;
      if (nextEvR.current <= 0) {
        const ev = EVENTS[Math.floor(Math.random()*EVENTS.length)];
        evR.current = ev; evTimerR.current = ev.dur;
        setActiveEv({...ev, _ts:Date.now()}); setEvTimer(ev.dur);
        _snd.play('event');
        // RE/Gold ได้ income bonus เมื่อ event ดีๆ เกิด
        if((ev.eff.realestate||0)>0.1){
          const bonus=["CONDO","HOUSE","MALL"].reduce((s,id)=>s+((holdR.current[id]||0)*(ASSETS.find(a=>a.id===id)||{inc:0}).inc*3),0);
          if(bonus>0){cashR.current+=bonus;syncCash();showNotif(`🏘️ อสังหาฯบูม! ค่าเช่าพิเศษ +${fmt(bonus)}`,"#fbbf24");}
        }
        if((ev.eff.gold||0)>0.1){
          const bonus=["GOLD","SILV"].reduce((s,id)=>s+((holdR.current[id]||0)*(ASSETS.find(a=>a.id===id)||{inc:0}).inc*5),0);
          if(bonus>0){cashR.current+=bonus;syncCash();showNotif(`✨ ทองบูม! ปันผลพิเศษ +${fmt(bonus)}`,"#f59e0b");}
        }
        const [lo,hi] = cfg.evInt;
        nextEvR.current = Math.floor(Math.random()*(hi-lo))+lo;
        if(botsR.current.length>0){
          const cb=botsR.current[Math.floor(Math.random()*botsR.current.length)];
          const cmt=[`${ev.title} !!`,Math.random()<0.5?"รีบซื้อ!":"ระวังด้วยนะ!","โอ้โห แรงมาก!","ใครรู้ล่วงหน้าเนี่ย 😂"][Math.floor(Math.random()*4)];
          setTimeout(()=>addChatMsg(cb.name,cmt),400+Math.random()*800);
        }
      }
      if (evTimerR.current > 0) {
        evTimerR.current--;
        setEvTimer(evTimerR.current);
        if (evTimerR.current <= 0) { evR.current=null; setActiveEv(null); }
      }

      if (cfg.cards) {
        nextCardR.current--;
        if (nextCardR.current <= 0) {
          const c = PCARDS[Math.floor(Math.random()*PCARDS.length)];
          setCards(prev => prev.length<3?[...prev,c]:prev);
          nextCardR.current = cfg.cards ? 35 : 55;
        }
      }

      // Short fee + force cover (offline) — deduct from bank
      if (tickR.current % 10 === 0) {
        Object.entries(shortR.current).forEach(([assetId, pos]) => {
          const price = priceR.current[assetId] || 0;
          const fee = Math.ceil(price * pos.qty * 0.003);
          if (fee > 0) bankR.current = Math.max(0, bankR.current - fee);
          if (price >= pos.openPrice * 1.5) {
            const pnl = (pos.openPrice - price) * pos.qty;
            bankR.current = Math.max(0, bankR.current - price * pos.qty);
            delete shortR.current[assetId];
            syncShort();
            showNotif(`⚠️ ${assetId} Force Cover! ขาดทุน ฿${Math.abs(Math.round(pnl)).toLocaleString()}`, "#f87171");

      }

      if (tickR.current % 30 === 0) {
        const incomeAssets = gameAssets.filter(a=>a.inc);
        let totalIncome = 0;
        incomeAssets.forEach(a=>{
          const q = holdR.current[a.id]||0;

        });

      }

      // ── ดอกเบี้ยธนาคาร 1% ต่อนาที (ทุก 60 ticks) ──
      if (tickR.current % 60 === 0 && tickR.current > 0 && bankR.current > 0) {
        const interest = Math.round(bankR.current * 0.01);
        if (interest > 0) {
          bankR.current += interest; syncBank();
          showNotif(`🏦 ดอกเบี้ย +${fmt(interest)} (1%/นาที)`, "#fbbf24");

        }
      }

      botTick();

      // ═══ JOKE EVENTS ทุก 15s โอกาส 50% ═══
      if (tickR.current % 45 === 0 && Math.random() < 0.5) {
        const jokeEvts = [
          // 📰 ข่าวโอกาสน้อยแต่ไม่ใช่ศูนย์
          { msg:"รัฐบาลไทยจะรับ BTC เป็นเงินตราอย่างเป็นทางการ", color:"#fb923c" },

        ];
        const jk = jokeEvts[Math.floor(Math.random()*jokeEvts.length)];
        showNotif(jk.msg, jk.color);
      }

      // Mini-events every 20s — กระทบ 1 asset เพิ่มความตื่นเต้นระหว่าง main events
      if (tickR.current % 20 === 0 && !evR.current) {
        const miniEvts=[
          {id:"m1",a:"AAPL",msg:"🍎 Apple รายได้ดี!",   ch:+0.06},
          {id:"m2",a:"TSLA",msg:"⚡ Tesla delivery สูง!",ch:+0.08},
          {id:"m3",a:"BTC", msg:"₿ BTC ขยับขึ้น",       ch:+0.07},

        const mev=miniEvts[Math.floor(Math.random()*miniEvts.length)];
        if(priceR.current[mev.a]){
          priceR.current[mev.a]=Math.max(priceR.current[mev.a]*(1+mev.ch), (gameAssets.find(a=>a.id===mev.a)||{bp:1}).bp*0.05);
          setPrices({...priceR.current});
          showNotif(mev.msg, mev.ch>0?"#4ade80":"#f87171");
        }
      }

      // Hype index: mean-revert to 1.05 (ตลาดปกติเหนือทุน)
      if(tickR.current % 4 === 0){
        ['card','figure','gameid'].forEach(t=>{
          const pull=(1.05 - hypeIdxR.current[t])*0.04; // mean-revert to 1.05
          const noise=(Math.random()-0.5)*0.28;
          hypeIdxR.current[t]=Math.max(0.25,Math.min(5.5,hypeIdxR.current[t]+pull+noise));
        });
        setHypeIdx({...hypeIdxR.current});
      }

      // Hype events every 22 ticks (35% chance) — crash มากกว่า pump
      if(tickR.current % 22 === 0 && Math.random()<0.35){
        const hypeEvts=[
          {t:"card",   msg:"🃏 Card Hype! การ์ดร้อนแรง!",    mult:1.6},
          {t:"figure", msg:"🎎 Figure Boom! ฟิกเกอร์บูม!",    mult:1.5},
          {t:"gameid", msg:"🎮 Game Launch! ไอดีร้อน!",       mult:1.6},
          {t:"card",   msg:"🃏 SSR Spotted! การ์ดหายากพุ่ง!",  mult:2.0},
          {t:"figure", msg:"🎎 Collab! ฟิกฯ Limited พุ่ง!",   mult:1.8},
          {t:"gameid", msg:"🎮 Pro Season! ไอดีแพงขึ้น!",     mult:1.7},
          {t:"card",   msg:"🃏 Card Dump! การ์ดราคาตก",        mult:0.55},
          {t:"figure", msg:"🎎 Figure Crash! ราคาดิ่ง",        mult:0.58},
          {t:"gameid", msg:"🎮 Game Dead! ไอดีราคาร่วง",       mult:0.50},
          {t:"card",   msg:"🃏 การ์ดล้นตลาด ลงหนัก",           mult:0.45},
          {t:"figure", msg:"🎎 โรงงานทุ่มตลาด ฟิกฯ ร่วง",     mult:0.48},
          {t:"gameid", msg:"🎮 Account Ban Wave! ไอดีตก",      mult:0.42},
        ];
        const hev=hypeEvts[Math.floor(Math.random()*hypeEvts.length)];
        hypeIdxR.current[hev.t]=Math.min(6.0,Math.max(0.15,hypeIdxR.current[hev.t]*hev.mult));
        setHypeIdx({...hypeIdxR.current});
        showNotif(hev.msg,"#c084fc");
      }

      // options expiry is handled in its own useEffect (timestamp-based, works online+offline)

      // race & auction handled in own useEffect (works online+offline)

      // NPC marketplace buyers (every 10 ticks) — เงินมาจากระบบ ไม่หักจากผู้เล่นหรือ bot คนไหน
      if(tickR.current % 10 === 0){
        const NPC_NAMES = ["คนแปลกหน้า🧑","นักสะสม🎒","แฟนอนิเม🌸","เซียนของหายาก🔍",
          "เด็กรวย💳","นักลงทุน🕵️","ลูกค้าออนไลน์📱","คนซื้อสด💵","ไม่รู้จัก🫥","ขาจร🚶"];
        const playerListings=mktplaceR.current.filter(l=>l.sellerIsMe);
        playerListings.forEach(listing=>{
          // ยิ่งแพงยิ่งซื้อยาก: โอกาสลดแบบ exponential ตามราคา
          // ฿100→~22%  ฿500→~17%  ฿2K→~10%  ฿10K→~3%  ฿50K→~0.3%
          const buyChance = 0.25 * Math.exp(-listing.price / 8000);
          if(Math.random() < buyChance){
            const npcName = NPC_NAMES[Math.floor(Math.random()*NPC_NAMES.length)];
            // เงินจากระบบ — ไม่ดึงจาก bot หรือ player คนไหน
            cashR.current += listing.price; syncCash();
            mktplaceR.current=mktplaceR.current.filter(l=>l.id!==listing.id);
            setMktplace([...mktplaceR.current]);
            hypeInvR.current=hypeInvR.current.filter(i=>i.id!==listing.itemId);
            setHypeInv([...hypeInvR.current]);
            showNotif(`🛒 ${npcName} ซื้อ ${listing.item.name} +฿${listing.price.toLocaleString()}`,"#4ade80");
            addChatMsg(npcName, `ได้ ${listing.item.emoji}${listing.item.name} มาแล้ว ขอบคุณ!`);
          }
        });
        // Bots add own listings
        if(Math.random()<0.15 && botsR.current.length>0 && mktplaceR.current.filter(l=>!l.sellerIsMe).length<8){
          const bot=botsR.current[Math.floor(Math.random()*botsR.current.length)];
          const types=['card','figure','gameid'];
          const t=types[Math.floor(Math.random()*types.length)];
          const item=genHypeItem(t);
          const fairV=item.bp*(hypeIdxR.current[t]||1);
          const price=Math.round(fairV*(0.7+Math.random()*0.55));
          const listing={id:`lm${Date.now()}${Math.random().toString(36).slice(2,4)}`,itemId:item.id,seller:bot.name,sellerIsMe:false,item,price};
          mktplaceR.current=[...mktplaceR.current,listing];
          setMktplace([...mktplaceR.current]);
        }
      }

      // Bot random chat every 7 ticks (18% chance)
      if(tickR.current % 7 === 0 && Math.random()<0.18 && botsR.current.length>0){
        const bot=botsR.current[Math.floor(Math.random()*botsR.current.length)];
        addChatMsg(bot.name,BOT_CHAT_POOL[Math.floor(Math.random()*BOT_CHAT_POOL.length)]);
      }

      if (session.endMode==="target" && session.target) {
        if (myNW() >= session.target) { clearInterval(id); endGame(session.nick); return; }
        for (const b of botsR.current) {
          if (b.nw >= session.target) { clearInterval(id); endGame(b.name); return; }
        }
      }
    }, 1000);
    return () => clearInterval(id);
  }, [cfg, gameAssets, botTick, showNotif, endGame, session, addChatMsg]);

  // ── OPTIONS EXPIRY (timestamp-based, runs in both online & offline) ──
  useEffect(() => {
    const id = setInterval(() => {
      if (optionsR.current.length === 0) return;
      const now = Date.now();
      const remaining = [];
      let changed = false;
      optionsR.current.forEach(opt => {
        if (now >= opt.expiryAt) {
          changed = true;
          const p = priceR.current[opt.assetId] || 0;
          const won = opt.type === 'call' ? p >= opt.strike : p <= opt.strike;
          if (won) {
            const profit = opt.type === 'call' ? (p - opt.strike) * opt.qty : (opt.strike - p) * opt.qty;
            if (profit > 0) {
              bankR.current += Math.round(profit); syncBank();
              showNotif(`📋 ${opt.type==="call"?"📈":"📉"} ${opt.assetEmoji}${opt.assetName} ชนะ! +${fmt(Math.round(profit))} (ธนาคาร)`, "#4ade80");
              _snd.play('jackpot');
            } else {
              showNotif(`📋 Option ${opt.assetEmoji}${opt.assetName} หมดอายุ (ราคาไม่เคลื่อน)`, "#f87171");
            }
          } else {
            showNotif(`📋 Option ${opt.assetEmoji}${opt.assetName} หมดอายุ — premium หายไปแล้ว`, "#f87171");
          }
        } else {
          remaining.push(opt);
        }
      });
      if (changed) {
        optionsR.current = remaining;
        setOptions([...remaining]);
      }
    }, 500);
    return () => clearInterval(id);
  }, [showNotif, syncCash]);

  // ── RACE & AUCTION (runs in both online & offline, every 1s) ──
  useEffect(() => {
    const id = setInterval(() => {
      if (onlineRef.current) return; // online mode: race & auction driven by timeLeft effect
      // ── HORSE RACE (automated, horse-based) ──
      {
        const NPC_NICKS = ["สมชาย","นุ่น","แม็กซ์","จุ๋ม","เต้","บาส","พิม","เอิร์น","ต้น","มิ้น"];
        const rs = raceR.current;
        if (rs.phase === 'break') {
          rs.breakTick--;
          if (rs.breakTick <= 0) {
            rs.phase = 'betting'; rs.betTick = 25;
            rs.positions = [0,0,0,0,0];
            rs.velocities = HORSE_NAMES.map(()=>1.5+Math.random()*1.5);
            rs.winner = -1; rs.playerBet = null; rs.npcBets = [[],[],[],[],[]]; rs.won = false;
            setRace({...rs}); setRacePickedHorse(-1);
            showNotif("🏇 เปิดรับเดิมพัน! แข่งม้า — 25 วิ!", "#fbbf24");
            _snd.play('event');
          } else { setRace({...rs}); }
        } else if (rs.phase === 'betting') {
          rs.betTick--;
          if (Math.random() < 0.35) {
            const nick = NPC_NICKS[Math.floor(Math.random()*NPC_NICKS.length)];
            const horse = Math.floor(Math.random()*5);
            const amount = Math.floor(Math.random()*400+100);
            rs.npcBets[horse] = [...rs.npcBets[horse].slice(-2), {nick, amount}];
          }
          if (rs.betTick <= 0) {
            rs.phase = 'racing';
            setRace({...rs});
            showNotif("🏁 ม้าออกสตาร์ท!", "#fbbf24"); _snd.play('beepHi');
            // fast racing sub-interval at 250ms for smooth animation (~15s race)
            if (racingSubIdR.current) clearInterval(racingSubIdR.current);
            racingSubIdR.current = setInterval(() => {
              const rs = raceR.current;
              if (rs.phase !== 'racing') { clearInterval(racingSubIdR.current); racingSubIdR.current = null; return; }
              rs.velocities = rs.velocities.map(v => Math.max(0.5, Math.min(4, v + (Math.random()-0.5)*1.5)));
              rs.positions = rs.positions.map((p,i) => Math.min(100, p + rs.velocities[i]));
              const finIdx = rs.positions.findIndex(p => p >= 100);
              if (finIdx >= 0) {
                rs.winner = finIdx; rs.phase = 'result';
                rs.won = rs.playerBet?.horse === finIdx;
                if (rs.playerBet) {
                  if (rs.won) {
                    const pay = Math.round(rs.playerBet.amount * 2.4); cashR.current += pay; syncCash();
                    showNotif(`🏆 ${HORSE_EMOJIS[finIdx]} ${HORSE_NAMES[finIdx]} ชนะ! +${fmt(pay)} (×2.4)`, "#fbbf24");
                    _snd.play('jackpot'); setConfetti(true); setTimeout(()=>setConfetti(false),3000);
                  } else {
                    showNotif(`💔 ${HORSE_EMOJIS[finIdx]} ${HORSE_NAMES[finIdx]} ชนะ — เสีย ${fmt(rs.playerBet.amount)}`, "#f87171");
                    _snd.play('bust');
                  }
                } else {
                  showNotif(`🏁 ${HORSE_EMOJIS[finIdx]} ${HORSE_NAMES[finIdx]} ชนะ!`, "#94a3b8");
                }
                setRace({...rs});
                setTimeout(()=>{ raceR.current.phase='break'; raceR.current.breakTick=30+Math.floor(Math.random()*20); setRace({...raceR.current}); }, 6000);
                clearInterval(racingSubIdR.current); racingSubIdR.current = null;
              } else {
                setRace({...rs});
              }
            }, 250);
          } else { setRace({...rs}); }
        }
      }
      // ── MONOPOLY AUCTION ──
      {
        const as = auctionR.current;
        if (as.phase === 'idle') {
          as.countdown--;
          if (as.countdown <= 0) {
            const a = gameAssets[Math.floor(Math.random()*gameAssets.length)];
            as.asset = a; as.phase = 'bidding'; as.window = 20;
            as.currentBid = Math.round((priceR.current[a.id]||a.bp)*0.15)||300;
            as.currentBidder = null;
            setAuction({...as}); setBidInput(as.currentBid+200);
            showNotif(`🔨 AUCTION! สิทธิ์ผูกขาด ${a.emoji}${a.name} — ประมูล 20 วิ!`, "#c084fc");
            _snd.play('event');
          }
        } else if (as.phase === 'bidding') {
          as.window--;
          if (Math.random() < 0.08 && botsR.current.length > 0) {
            const bot = botsR.current[Math.floor(Math.random()*botsR.current.length)];
            const botBid = as.currentBid + Math.floor(Math.random()*300)+100;
            if (bot.cash >= botBid && (as.currentBidder !== "player" || Math.random()<0.4)) {
              if (as.currentBidder === "player") { cashR.current += as.currentBid; syncCash(); }
              as.currentBid = botBid; as.currentBidder = bot.nick||bot.name;
            }
          }
          if (as.window <= 0) {
            if (!as.currentBidder) {
              showNotif("🔨 ประมูลจบ — ไม่มีผู้ชนะ","#ffffff44");
              as.phase='idle'; as.countdown=35+Math.floor(Math.random()*20); setAuction(null);
            } else if (as.currentBidder === "player") {
              as.phase='owned'; as.ownerNick=session.nick; as.ownerExpiry=60;
              showNotif(`👑 คุณชนะ! ผูกขาด ${as.asset.emoji}${as.asset.name} 60 วิ เก็บค่าผ่านทาง!`, "#c084fc");
              _snd.play('jackpot'); setAuction({...as});
            } else {
              as.phase='owned'; as.ownerNick=as.currentBidder; as.ownerExpiry=60;
              showNotif(`${as.currentBidder} ชนะประมูล ${as.asset.emoji}${as.asset.name}`, "#ffffff44");
              setAuction({...as});
            }
          } else { setAuction({...as}); }
        } else if (as.phase === 'owned') {
          as.ownerExpiry--;
          if (as.ownerExpiry <= 0) {
            showNotif(`${as.asset.emoji} สิทธิ์ผูกขาดหมดอายุ`, "#ffffff44");
            as.phase='idle'; as.countdown=35+Math.floor(Math.random()*20); setAuction(null);
          } else {
            if (as.ownerNick === session.nick && as.ownerExpiry % 5 === 0) {
              const toll = Math.max(10, Math.round((priceR.current[as.asset.id]||as.asset.bp)*0.018));
              cashR.current += toll; syncCash();
              if (as.ownerExpiry % 15 === 0) showNotif(`👑 ค่าผ่านทาง ${as.asset.emoji} +${fmt(toll)}`, "#c084fc");
            }
            setAuction({...as});
          }
        }
      }
      // ── BOX STOCK RESTOCK (every 120s) ──
      {
        boxTimerR.current--;
        setBoxTimer(boxTimerR.current);
        if (boxTimerR.current <= 0) {
          boxTimerR.current = 120;
          const ns = {
            card:  Math.floor(Math.random()*15)+1,
            figure:Math.floor(Math.random()*15)+1,
            gameid:Math.floor(Math.random()*15)+1,
          };
          boxStockR.current = ns;
          setBoxStock({...ns});
          showNotif(`📦 กล่องสุ่มรีสต็อก! การ์ด×${ns.card} ฟิก×${ns.figure} ไอดี×${ns.gameid}`, "#fbbf24");
          _snd.play('event');
        }
      }
    }, 1000);
    return () => { clearInterval(id); if (racingSubIdR.current) { clearInterval(racingSubIdR.current); racingSubIdR.current = null; } };
  }, [showNotif, syncCash, session, gameAssets]);

  const doBuy = (q) => {
    const p = priceR.current[selAsset.id]||selAsset.bp;
    const cost = p * q;
    if (onlineRef.current && client?.ok) {
      client.buy(selAsset.id, q);
      _snd.play('buy');
      addTrade({type:'buy',asset:selAsset,qty:q,price:p,total:cost});
      setModal(null); return;
    }
    if (bankR.current < cost) { showNotif(`❌ ธนาคารไม่พอ ต้องการ ${fmt(cost)} — ฝากเงินก่อนนะ 🏦`,"#f87171"); return; }
    bankR.current -= cost;
    holdR.current[selAsset.id] = (holdR.current[selAsset.id]||0)+q;
    basisR.current[selAsset.id] = (basisR.current[selAsset.id]||0)+cost;
    syncBank(); syncHold(); syncBasis();
    _snd.play('buy');
    addTrade({type:'buy',asset:selAsset,qty:q,price:p,total:cost});
    showNotif(`▲ ซื้อ ${selAsset.name} ×${q}  −${fmt(cost)} 🏦`, "#4ade80");
    setModal(null);
  };

  const doSell = (q) => {
    const p = priceR.current[selAsset.id]||selAsset.bp;
    const gain = p * q;
    if (onlineRef.current && client?.ok) {
      client.sell(selAsset.id, q);
      _snd.play('sell');
      addTrade({type:'sell',asset:selAsset,qty:q,price:p,total:gain});
      setModal(null); return;
    }
    const have = holdR.current[selAsset.id]||0;
    if (have < q) { showNotif("❌ ไม่มีพอขาย","#f87171"); return; }
    bankR.current += gain;
    holdR.current[selAsset.id] = have - q;
    const avgCost = (basisR.current[selAsset.id]||0) / Math.max(have,1) * q;
    basisR.current[selAsset.id] = Math.max(0, (basisR.current[selAsset.id]||0) - avgCost);
    syncBank(); syncHold(); syncBasis();
    _snd.play('sell');
    addTrade({type:'sell',asset:selAsset,qty:q,price:p,total:gain});
    showNotif(`▼ ขาย ${selAsset.name} ×${q}  +${fmt(gain)} 🏦`, "#38bdf8");
    setModal(null);
  };

  const doShort = (q) => {
    const p = priceR.current[selAsset.id]||selAsset.bp;
    const receive = p * q;
    if (onlineRef.current && client?.ok) {
      client.send("TRADE", { action:"short", assetId:selAsset.id, qty:q });
      _snd.play('short');
      addTrade({type:'short',asset:selAsset,qty:q,price:p,total:receive});
      setModal(null); return;
    }
    if (p * q > bankR.current) { showNotif(`❌ Short ต้องการ margin ในธนาคาร ${fmt(p*q)} (สูงสุด ${Math.floor(bankR.current/p)} หน่วย)`,"#f87171"); return; }
    bankR.current += receive;
    const ex = shortR.current[selAsset.id];
    if (ex) {
      const total = ex.qty + q;
      shortR.current[selAsset.id] = { qty: total, openPrice: (ex.openPrice*ex.qty + p*q) / total };
    } else {
      shortR.current[selAsset.id] = { qty: q, openPrice: p };
    }
    syncBank(); syncShort();
    _snd.play('short');
    addTrade({type:'short',asset:selAsset,qty:q,price:p,total:receive});
    showNotif(`⬇ Short ${selAsset.name} ×${q} รับ +${fmt(receive)} 🏦`, "#f87171");
    setModal(null);
  };

  const doCover = (q) => {
    const pos = shortR.current[selAsset.id];
    const p = priceR.current[selAsset.id]||selAsset.bp;
    const pnl = pos ? (pos.openPrice - p) * q : 0;
    if (onlineRef.current && client?.ok) {
      client.send("TRADE", { action:"cover", assetId:selAsset.id, qty:q });
      _snd.play(pnl>=0?'win':'sell');
      addTrade({type:'cover',asset:selAsset,qty:q,price:p,total:pnl});
      setModal(null); return;
    }
    if (!pos || pos.qty < q) { showNotif("❌ ไม่มี short position พอ","#f87171"); return; }
    const cost = p * q;
    if (bankR.current < cost) { showNotif(`❌ ธนาคารไม่พอ cover — ต้องการ ${fmt(cost)} 🏦`,"#f87171"); return; }
    bankR.current -= cost;
    if (q >= pos.qty) delete shortR.current[selAsset.id];
    else shortR.current[selAsset.id] = { qty: pos.qty - q, openPrice: pos.openPrice };
    syncBank(); syncShort();
    _snd.play(pnl>=0?'win':'sell');
    addTrade({type:'cover',asset:selAsset,qty:q,price:p,total:pnl});
    showNotif(`↑ Cover ${selAsset.name} ×${q} ${pnl>=0?"+":""}${fmt(pnl)}`, pnl>=0?"#4ade80":"#f87171");
    setModal(null);
  };

  const doOption = (optData) => {
    const { type, strike, qty, premium, assetId } = optData;
    if (bankR.current < premium) { showNotif("❌ ธนาคารไม่พอซื้อ Options 🏦","#f87171"); return; }
    bankR.current -= premium; syncBank();
    const opt = {
      id: `opt${Date.now()}`, type, assetId,
      assetName: selAsset?.name||assetId, assetEmoji: selAsset?.emoji||"",
      strike, qty, expiryAt: Date.now() + 30000, openPrice: priceR.current[assetId]||strike,
    };
    optionsR.current = [...optionsR.current, opt];
    setOptions([...optionsR.current]);
    _snd.play('buy');
    showNotif(`📋 ${type==="call"?"📈 CALL":"📉 PUT"} ${selAsset?.name} ×${qty} (−฿${premium.toLocaleString()})`, "#fbbf24");
    setModal(null);
  };

  const doRaceBet = (horseIdx, amount) => {
    const rs = raceR.current;
    if (rs.phase !== 'betting') { showNotif("⛔ ปิดรับแล้ว","#f87171"); return; }
    if (onlineRef.current && client?.ok) {
      client.send("RACE_BET", { horse: horseIdx, amount });
      return; // server validates, deducts cash, and sends RACE_BET_RESULT
    }
    if (cashR.current < amount) { showNotif("❌ เงินไม่พอ","#f87171"); return; }
    if (rs.playerBet) cashR.current += rs.playerBet.amount; // refund previous
    cashR.current -= amount; syncCash();
    raceR.current.playerBet = {horse: horseIdx, amount};
    setRace({...raceR.current});
    setRacePickedHorse(horseIdx);
    showNotif(`🐎 เดิมพัน ${HORSE_EMOJIS[horseIdx]} ${HORSE_NAMES[horseIdx]} ฿${amount.toLocaleString()}`, HORSE_COLORS[horseIdx]);
  };

  const doBid = (amount) => {
    const aState = auctionR.current;
    if (!aState || aState.phase !== 'bidding') return;
    if (amount <= aState.currentBid) { showNotif(`❌ ต้อง Bid มากกว่า ฿${aState.currentBid.toLocaleString()}`,"#f87171"); return; }
    if (onlineRef.current && client?.ok) {
      client.send("AUCTION_BID", { amount });
      return; // server validates, refunds previous bidder, sends AUCTION_BID_RESULT + AUCTION_BID_UPDATE
    }
    if (cashR.current < amount) { showNotif("❌ เงินไม่พอ","#f87171"); return; }
    if (aState.currentBidder === "player") cashR.current += aState.currentBid; // refund my prev bid
    cashR.current -= amount; syncCash();
    auctionR.current.currentBid = amount;
    auctionR.current.currentBidder = "player";
    setAuction({...auctionR.current});
    setBidInput(amount + 200);
    showNotif(`🔨 Bid ฿${amount.toLocaleString()} — คุณนำอยู่!`, "#c084fc");
  };

  const openGamble = (id, bet) => {
    if (cashR.current < bet) { showNotif(`❌ เงินสดไม่พอ (ต้องการ ${fmt(bet)})`,"#f87171"); return; }
    activeBetR.current = bet;
    setBetSelectId(null);
    if (onlineRef.current && client?.ok) {
      // online: หักเงินฝั่ง server — ไม่หักเองก่อน
      setModal(id); return;
    }
    // offline
    cashR.current -= bet; syncCash(); setModal(id);
  };
  const GAMBLE_COSTS = {lottery:100,scratch:50,crash:200,flip:300,roulette:150,plinko:200,mines:200,blackjack:300};
  const handleGambleResult = (res) => {
    if (onlineRef.current && client?.ok) {
      client.gamble(modal, GAMBLE_COSTS[modal]||100, res.choice||null);
      setModal(null);
      return;
    }
    // offline
    const paidCost = res.betPaid || activeBetR.current || GAMBLE_COSTS[modal] || 0;
    const notifMsg = (msg, fallback) => (msg && msg !== "ปิด") ? msg : fallback;
    if (res.push) {
      cashR.current += paidCost; syncCash();
      showNotif(notifMsg(res.msg, "🤝 Push — คืนเงิน"), "#fbbf24");
    } else if (res.win && res.amount > 0) {
      cashR.current += res.amount; gWinR.current += res.amount;
      syncCash(); setGWin(gWinR.current);
      if (res.amount >= 3000) { _snd.play('jackpot'); setConfetti(true); setTimeout(()=>setConfetti(false),4000); }
      else _snd.play('win');
      const profit = res.amount - paidCost;
      showNotif(notifMsg(res.msg, `✅ ชนะ +฿${profit.toLocaleString()}`), "#4ade80");
    } else if (!res.win && res.amount > 0) {
      // partial return (e.g. Plinko sub-1×)
      cashR.current += res.amount; syncCash();
      const netLoss = paidCost - res.amount;
      if (netLoss > 0) { gLossR.current += netLoss; setGLoss(gLossR.current); }
      showNotif(notifMsg(res.msg, `💸 เสียสุทธิ ฿${netLoss.toLocaleString()}`), "#f87171");
    } else {
      gLossR.current += paidCost; setGLoss(gLossR.current);
      showNotif(notifMsg(res.msg, `❌ เสีย ฿${paidCost.toLocaleString()}`), "#f87171");
    }
    if (modal !== "plinko") setModal(null);
  };
  const handleBlackjackDouble = (extraBet) => {
    if (onlineRef.current && client?.ok) return;
    cashR.current -= extraBet; syncCash();
  };
  const cancelGamble = (id) => {
    if (!onlineRef.current || !client?.ok) {
      const refund = activeBetR.current || GAMBLE_COSTS[id] || 0;
      cashR.current += refund; syncCash();
    }
    setModal(null);
  };
  const handlePlinkoPlayAgain = () => {
    const bet = activeBetR.current;
    if (cashR.current < bet) { showNotif("❌ เงินสดไม่พอ","#f87171"); setModal(null); return; }
    cashR.current -= bet; syncCash();
    setPlinkoKey(k => k + 1);
  };

  const useCard = (card, idx) => {
    if (card.id==="freeze") {
      frozenR.current=true; setFrozen(true);
      setTimeout(()=>{ frozenR.current=false; setFrozen(false); },10000);
      showNotif("❄️ ตลาดแช่แข็ง 10 วิ","#38bdf8");
    } else if (card.id==="squeeze") {
      gameAssets.filter(a=>a.type==="crypto").forEach(a=>priceR.current[a.id]*=1.25);
      setPrices({...priceR.current});
      showNotif("⚡ Crypto พุ่ง +25%!","#c084fc");
    } else if (card.id==="intel") {
      const n=EVENTS[Math.floor(Math.random()*EVENTS.length)];
      setIntelEv(n); setTimeout(()=>setIntelEv(null),8000);
      showNotif("🕵️ Insider Intel!","#fbbf24");
    } else if (card.id==="copy") {
      const lead = [...botsR.current].sort((a,b)=>b.nw-a.nw)[0];
      if (lead) {
        const top = Object.entries(lead.hold).sort((a,b)=>b[1]-a[1])[0];
        if (top) {
          const [aid,aq]=top, ga=gameAssets.find(x=>x.id===aid);
          const cq=Math.max(1,Math.floor(aq*0.35)), cost=(priceR.current[aid]||0)*cq;
          if (bankR.current>=cost&&ga) {
            bankR.current-=cost; holdR.current[aid]=(holdR.current[aid]||0)+cq;
            basisR.current[aid]=(basisR.current[aid]||0)+cost;
            syncBank(); syncHold(); syncBasis();
            showNotif(`📋 Copy ${lead.name}: ${ga.name} ×${cq}`,"#4ade80");
          }
        }
      }
    } else if (card.id==="bomb") {
      gameAssets.forEach(a=>priceR.current[a.id]*=(0.82+Math.random()*0.36));
      setPrices({...priceR.current});
      showNotif("💣 ตลาดผันผวน!","#f87171");
    }
    setCards(p=>p.filter((_,i)=>i!==idx));
  };

const allP = (onlineRef.current && board.length > 0)
  ? board.map(p=>({...p, nw:p.nw||0, isMe:p.nick===session.nick})).sort((a,b)=>b.nw-a.nw)
  : [{id:"me", nick:session.nick, name:session.nick, nw:displayNW, isMe:true},
     ...botsR.current.map(b=>({id:b.id, nick:b.nick||b.name, name:b.nick||b.name, nw:b.nw}))
    ].sort((a,b)=>b.nw-a.nw);
const myRank = allP.findIndex(p=>p.isMe)+1;

  const mins=Math.floor(timeLeft/60), secs=timeLeft%60;
  const tPct=(timeLeft/(session.duration||cfg.dur))*100;
  const tColor=timeLeft<30?"#f87171":timeLeft<60?"#fbbf24":"#4ade80";
  const phaseC={BULL:"#4ade80",SIDEWAYS:"#fbbf24",BEAR:"#f87171"}[phase];
  const tProg = session.endMode==="target" && session.target
    ? Math.min(100, displayNW/session.target*100) : null;

  const selP    = prices[selAsset?.id]||selAsset?.bp||0;
  const selHave = hold[selAsset?.id]||0;
  const selHist = histR.current[selAsset?.id]||[];
  const selUp   = selHist.length>1 && selHist[selHist.length-1]>=selHist[0];

  return (
    <div style={{minHeight:"100vh",background:G.bg,fontFamily:G.font,paddingBottom:72}}>

      {/* ONLINE STATUS BAR */}
      {ONLINE_MODE && (
        <div style={{
          background: client?.ok ? "#4ade8015":"#f8717115",
          borderBottom:`1px solid ${client?.ok?"#4ade8030":"#f8717130"}`,
          padding:"4px 14px", fontSize:9, letterSpacing:1,
          color: client?.ok?"#4ade8099":"#f8717199",
          display:"flex", justifyContent:"space-between",
          fontFamily:G.font,
        }}>
          <span>{client?.ok ? "🟢 ONLINE — ข้อมูลจาก Server" : "🔴 OFFLINE"}</span>
          <span>{allP.length} ผู้เล่น</span>
        </div>
      )}

      {/* TOP BAR */}
      <div style={{position:"sticky",top:0,zIndex:200,
        background:`linear-gradient(180deg,${G.bg}fc 0%,${G.bg}ee 100%)`,
        backdropFilter:"blur(20px)",
        borderBottom:`1px solid ${G.border}`,
        boxShadow:"0 4px 24px #00000044"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px"}}>
          <div style={{minWidth:100}}>
            <div style={{fontSize:7,letterSpacing:3,color:"#ffffff20",marginBottom:3}}>P&L</div>
            <div style={{display:"flex",alignItems:"baseline",gap:4}}>
              <AnimNum value={displayNW - initCash} color={displayNW>=initCash?"#4ade80":"#f87171"} size={20}/>
            </div>
            <div style={{fontSize:8,marginTop:1,
              color:displayNW>=initCash?"#4ade8077":"#f8717177",fontWeight:700}}>
              {displayNW>=initCash?"+":""}{((displayNW-initCash)/initCash*100).toFixed(1)}%
            </div>
          </div>
          <div style={{textAlign:"center",flex:1}}>
            {session.endMode==="time" ? (
              <>
                <div style={{fontSize:30,fontWeight:900,color:tColor,lineHeight:1,fontVariantNumeric:"tabular-nums",
                  textShadow:`0 0 20px ${tColor}55, 0 0 40px ${tColor}22`,letterSpacing:-1}}>
                  {String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}
                </div>
                <div style={{fontSize:8,color:phaseC,letterSpacing:2,marginTop:3,fontWeight:700}}>{phase}</div>
              </>
            ) : (
              <>
                <div style={{fontSize:9,color:"#fbbf24",marginBottom:4}}>🎯 {fmt(session.target)}</div>
                <div style={{width:96,height:6,background:"#ffffff0f",borderRadius:4,margin:"0 auto",overflow:"hidden"}}>
                  <div style={{height:"100%",borderRadius:4,width:`${tProg}%`,
                    background:"linear-gradient(90deg,#4ade80,#22c55e,#fbbf24)",transition:"width .5s",
                    boxShadow:"0 0 8px #4ade8066"}}/>
                </div>
                <div style={{fontSize:8,color:"#ffffff33",marginTop:3}}>{tProg?.toFixed(0)}%</div>
              </>
            )}
          </div>
          <div style={{textAlign:"right",minWidth:64}}>
            <div style={{fontSize:7,letterSpacing:3,color:"#ffffff20",marginBottom:3}}>RANK</div>
            <div style={{fontSize:26,fontWeight:900,lineHeight:1,
              color:myRank===1?"#ffd700":myRank===2?"#c0c0c0":myRank===3?"#cd7f32":"#ffffff44",
              textShadow:myRank===1?"0 0 16px #ffd70066":undefined}}>
              #{myRank}
            </div>
            <div style={{fontSize:8,color:"#ffffff22"}}>{allP.length}P</div>
          </div>
        </div>
        {/* cash + bank breakdown bar */}
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:6,
          padding:"5px 10px 8px",borderTop:`1px solid ${G.border}44`,position:"relative",flexWrap:"wrap"}}>
          <button onClick={()=>setBankModal(true)} style={{
            display:"flex",alignItems:"center",gap:3,padding:"3px 7px",borderRadius:7,
            border:"1px solid #4ade8022",background:"#4ade8008",cursor:"pointer",fontFamily:G.font,
          }}>
            <span style={{fontSize:9}}>💵</span>
            <AnimNum value={cash} color="#38bdf8" size={11} bold={false}/>
            <span style={{fontSize:8,color:"#ffffff22"}}>│</span>
            <span style={{fontSize:9}}>🏦</span>
            <AnimNum value={bank} color="#4ade80" size={11} bold={false}/>
          </button>
          <span style={{fontSize:8,color:"#ffffff15"}}>│</span>
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <span style={{fontSize:9}}>📈</span>
            <span style={{fontSize:10,color:"#4ade80",fontWeight:700}}>{fmt(stockVal+cryptoVal+goldVal+commVal)}</span>
          </div>
          <span style={{fontSize:8,color:"#ffffff15"}}>│</span>
          <div style={{display:"flex",alignItems:"center",gap:3}}>
            <span style={{fontSize:9}}>🏠</span>
            <span style={{fontSize:10,color:"#f87171",fontWeight:700}}>{fmt(realVal)}</span>
          </div>
          {session.endMode==="time" && (
            <div style={{height:2,width:"100%",position:"absolute",left:0,bottom:0,background:"#ffffff05"}}>
              <div style={{height:"100%",width:`${tPct}%`,
                background:`linear-gradient(90deg,${tColor}88,${tColor})`,
                boxShadow:`0 0 6px ${tColor}44`,
                transition:"width 1s linear"}}/>
            </div>
          )}
        </div>
      </div>

      {activeEv && (
        <div key={activeEv._ts||activeEv.id} style={{
          margin:"8px 12px",padding:"11px 16px",borderRadius:13,
          background:"linear-gradient(135deg,#fbbf2418,#f59e0b0a)",
          border:"1px solid #fbbf2845",
          display:"flex",justifyContent:"space-between",alignItems:"center",
          animation:"event-banner-in 0.4s cubic-bezier(0.34,1.56,0.64,1)",
          boxShadow:"0 4px 24px #fbbf2422, 0 0 0 1px #fbbf2415",
        }}>
          <div>
            <div style={{fontSize:7,letterSpacing:3,color:"#fbbf2455",marginBottom:3}}>⚡ MARKET EVENT</div>
            <div style={{color:"#fbbf24",fontWeight:700,fontSize:13,textShadow:"0 0 12px #fbbf2444"}}>{activeEv.title}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
            <div style={{fontSize:22,fontWeight:900,color:"#fbbf24",lineHeight:1,fontVariantNumeric:"tabular-nums",
              textShadow:"0 0 16px #fbbf2455"}}>{evTimer}s</div>
            <div style={{fontSize:7,color:"#fbbf2455",marginTop:2}}>เหลือ</div>
          </div>
        </div>
      )}
      {intelEv && (
        <div style={{margin:"0 14px 6px",padding:"8px 13px",borderRadius:9,background:"#c084fc0a",border:"1px solid #c084fc20"}}>
          <div style={{fontSize:8,letterSpacing:3,color:"#c084fc44",marginBottom:2}}>INTEL</div>
          <div style={{color:"#c084fc",fontWeight:700,fontSize:12}}>{intelEv.title} กำลังจะเกิด!</div>
        </div>
      )}

      {/* ── RACE BANNER ── */}
      {(race.phase==='break'||race.phase==='betting'||race.phase==='racing'||race.phase==='result') && (
        <div onClick={()=>setModal('horserace')} style={{margin:"5px 14px 0",padding:"10px 14px",borderRadius:11,
          background:"linear-gradient(135deg,#78350f12,#fbbf2408)",border:"1px solid #fbbf2430",
          cursor:"pointer",animation:"event-banner-in 0.4s cubic-bezier(0.34,1.56,0.64,1)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:8,letterSpacing:3,color:"#fbbf2466",marginBottom:1}}>🏇 HORSE RACE</div>
              <div style={{color:race.phase==='break'?"#ffffff55":"#fbbf24",fontWeight:700,fontSize:12}}>
                {race.phase==='break'?`แข่งม้าใน ${race.breakTick}s`:
                 race.phase==='betting'?`เปิดเดิมพัน — ${race.betTick}s รีบเลย!`:
                 race.phase==='racing'?'กำลังแข่ง! 🏁':
                 race.winner>=0?`${HORSE_EMOJIS[race.winner]} ${HORSE_NAMES[race.winner]} ชนะ!`:'ผลการแข่ง'}
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
              {race.phase==='break'&&<div style={{fontSize:9,color:"#ffffff22"}}>แตะเพื่อดู →</div>}
              {race.phase==='betting'&&!race.playerBet&&<div style={{fontSize:9,color:"#fbbf2466"}}>แตะเพื่อเดิมพัน →</div>}
              {race.phase==='betting'&&race.playerBet&&<div style={{fontSize:9,color:HORSE_COLORS[race.playerBet.horse],fontWeight:700}}>
                {HORSE_EMOJIS[race.playerBet.horse]} ฿{race.playerBet.amount?.toLocaleString()}
              </div>}
              {race.phase==='racing'&&race.playerBet&&<div style={{fontSize:9,color:"#fbbf2466"}}>ลุ้น ×2.4</div>}
              {race.phase==='result'&&race.winner>=0&&race.playerBet&&<div style={{fontSize:10,fontWeight:700,
                color:race.playerBet.horse===race.winner?"#4ade80":"#f87171"}}>
                {race.playerBet.horse===race.winner?`🏆 +฿${(Math.round(race.playerBet.amount*2.4)-race.playerBet.amount).toLocaleString()}`:'💔 เสียเดิมพัน'}
              </div>}
            </div>
          </div>
        </div>
      )}
